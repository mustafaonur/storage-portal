<html lang="tr">
<head>

<link rel="stylesheet" href="./assets/css/components.css">

<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">CSV Dosyalari Yukleniyor</div>
</div>

<div class="shell">

<header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="brand-title">Storage Intelligence</div>
        <div class="brand-sub">Huawei OceanStor / Dorado Fleet</div>
      </div>
    </div>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE MONITORING</div>
      <div id="clock"></div>
      <div id="data-fresh-badge" data-fresh-badge style="margin-top:2px"></div>
      <div id="header-summary">-</div>
    </div>
  </header>

  <div class="tabs" id="main-tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="hosts">Host Listesi</button>
    <button class="tab-btn" data-tab="luns">LUN Groups</button>
    <button class="tab-btn" data-tab="snapshots">Snapshot'lar</button>
    <button class="tab-btn" data-tab="nas">NAS</button>
    <button class="tab-btn" data-tab="hypermetro">HyperMetro</button>
  </div>

  <div class="tab-panel active" id="tab-overview">
    <div class="summary-grid" id="global-summary"></div>
    <div id="location-blocks"></div>
  </div>

  <div class="tab-panel" id="tab-hosts">
    <div class="section-title">Host Envanteri</div>
    <!-- Aktif filtre chip alani (alarm tiklamasi ile aktif olur) -->
    <div class="active-filter-chips sp-hidden" id="hostFilterChips"></div>
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Host ara..." id="host-search">

      <select class="filter-select" id="host-location"><option value="">Tum Lokasyonlar</option></select>

      <select class="filter-select" id="host-os">

        <option>Linux</option><option>Windows</option><option>VMware ESX</option><option>AIX</option>
      </select>
      <select class="filter-select" id="host-map">
        <option value="">Tum Durumlar</option><option>Mapped</option><option>Unmapped</option>
      </select>
    </div>
    <div id="host-table-wrap"></div>
  </div>

  <div class="tab-panel" id="tab-luns">
    <div class="section-title">LUN Group Envanteri</div>
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="LUN Group ara..." id="lun-search">
      </div>
      <select class="filter-select" id="lun-location"><option value="">Tum Lokasyonlar</option></select>
      <select class="filter-select" id="lun-cabinet"><option value="">Tum Kabinetler</option></select>
    </div>
    <div id="lun-table-wrap"></div>
  </div>

  <div class="tab-panel" id="tab-snapshots">
    <div class="section-title">Snapshot Listesi</div>

    <!-- ÖZET BAR -->
    <div id="snap-summary" class="sp-grid-4col sp-mb-16"></div>

    <!-- FİLTRE -->
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Snapshot, LUN veya host ara..." id="snap-search">
      </div>
      <select class="filter-select" id="snap-cabinet"><option value="">Tum Kabinetler</option></select>
      <select class="filter-select" id="snap-host"><option value="">Tum Hostlar</option></select>
      <select class="filter-select" id="snap-status">
        <option value="">Tüm Durumlar</option>
        <option value="Aktif">Aktif</option>
        <option value="Pasif">Pasif</option>
      </select>
      <select class="filter-select" id="snap-sort">
        <option value="host">Host Adına Göre</option>
        <option value="lun">LUN Adına Göre</option>
        <option value="cab">Kabinete Göre</option>

    </div>

  <div class="tab-panel" id="tab-nas">
    <div class="section-title">NAS — Filesystem & CIFS</div>

    <div id="nas-summary" class="sp-grid-3col sp-mb-18"></div>

    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Filesystem ara..." id="nas-search">
      </div>
      <select class="filter-select" id="nas-cabinet"><option value="">Tüm Kabinetler</option></select>
      <select class="filter-select" id="nas-proto">
        <option value="">Tüm Protokoller</option>
        <option value="NFS">NFS</option>
        <option value="CIFS">CIFS</option>
      </select>
      <select class="filter-select" id="nas-sort">
        <option value="cap-desc">Büyükten Küçüğe</option>
        <option value="name">İsme Göre</option>
        <option value="used-desc">Kullanıma Göre</option>
      </select>
    </div>
    <div id="nas-table-wrap"></div>
  </div>

  <div class="tab-panel" id="tab-hypermetro">
    <div class="section-title">HyperMetro Aktif Çiftler</div>

    <div id="hm-summary" class="sp-grid-4col sp-mb-18"></div>

    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="LUN adı, kabinet, domain ara..." id="hm-search">
      </div>
      <select class="filter-select" id="hm-cabinet"><option value="">Tüm Kabinetler</option></select>
      <select class="filter-select" id="hm-status">
        <option value="">Tüm Durumlar</option>
        <option value="Normal">Normal</option>
        <option value="Synchronized">Synchronized</option>
        <option value="Synchronizing">Synchronizing</option>
        <option value="Paused">Paused</option>
        <option value="Fault">Fault</option>
      </select>
    </div>
    <div id="hm-table-wrap"></div>
  </div>

  <div class="dash-footer">
    <span>HUAWEI OCEANSTOR / DORADO FLEET DASHBOARD</span>
    <span>POWERSHELL AUTOMATION v2.0</span>
  </div>
</div>

<!-- WWN MODAL -->
<div class="modal-backdrop" id="wwnModal">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <div class="modal-title">Host WWN'ler</div>
        <div class="modal-host" id="modalHostName">-</div>
      </div>
      <button class="modal-close" id="btn-modal-close-x" title="Kapat">&times;</button>
    </div>
    <div class="modal-body">
      <div class="wwn-format-toggle">
        <button class="wwn-format-btn active" id="fmtColon" data-format="colon">aa:aa:aa:aa</button>
        <button class="wwn-format-btn" id="fmtPlain" data-format="plain">aaaaaaaa</button>
      </div>
      <div id="wwnList"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="btn-copy-all-wwns">Hepsini Kopyala</button>
      <button class="modal-btn primary" id="btn-modal-close">Kapat</button>
    </div>
  </div>
</div>

<script>
let cabinets   = [];
let hosts      = [];
let lunGroups  = [];
let snapshots  = [];
let nasData    = [];
let hmData     = [];

const CSV_DASHBOARD = './data/Hw/Dorado_Dashboard.csv';
const CSV_HOSTS     = './data/Hw/Dorado_Host.csv';
const CSV_LUNGROUPS = './data/Hw/Dorado_Lun.csv';
const CSV_SNAPSHOT  = './data/Hw/Dorado_Snapshot.csv';
const CSV_NAS       = './data/Hw/Dorado_NAS.csv';
const CSV_HYPERMETRO= './data/Hw/Dorado_HyperMetro.csv';

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleDateString('tr-TR') + ' · ' + new Date().toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();


function parseDashboard(text) {
  const skip = ['---', '==='];
  return parseCSV(text)
    .filter(r => {
      const k = (r['Kabinet'] || '').trim();
      const l = (r['Lokasyon'] || '').trim();
      if (!k) return false;
      if (skip.includes(l)) return false;
      if (/^TOPLAM|^GENEL/i.test(k)) return false;
      return true;
    })
    .map(r => {
      const ip  = (r['IP'] || '').trim();
      const tot = (r['Total (TB)'] || '').trim();
      const isErr = ip === 'HATA' || tot === '' || tot === '-' || tot.toUpperCase() === 'HATA';

      if (isErr) return { location:r['Lokasyon'], name:r['Kabinet'], ip, error:true };

      const osObj = {};
      (r['OS Dagilimi'] || '').split('|').forEach(p => {
        const m = p.trim().match(/^(.+?):\s*(\d+)$/);
        if (m) osObj[m[1].trim()] = parseInt(m[2]);
      });

      return {
        location:   r['Lokasyon'],
        name:       r['Kabinet'],
        ip,
        total:      toN(r['Total (TB)']),
        used:       toN(r['Used (TB)']),
        subscribed: toN(r['Subscribed (TB)']),
        free:       toN(r['Free (TB)']),
        pct:        toN(r['Doluluk (%)']),
        dr:         (r['Data Reduction'] || '-').trim(),
        hostCount:  parseInt(r['Host Sayisi']) || 0,
        os:         osObj,
        version:    (r['Versiyon'] || '').trim(),
      };
    });
}

function parseHosts(text) {
  return parseCSV(text)
    .filter(r => (r['Host Name'] || '').trim() !== '')
    .map(r => ({
      location:  r['Lokasyon'],
      cabinet:   r['Kabinet'],
      host:      r['Host Name'],
      os:        r['OS'],
      map:       r['Map Durumu'],
      provTB:    toN(r['Provisioned (TB)']),
      wwns:      expandWwns(r['Host WWN'] || ''),
    }));
}

// Pipe-ayrılmış WWN listesini parse et; birleşik 32-hex'leri de ayır
function expandWwns(raw) {
  const result = [];
  (raw || '').split('|').forEach(chunk => {
    const hex = chunk.trim().toLowerCase().replace(/[^0-9a-f]/g, '');
    if (hex.length === 0) return;
    // 16'nın katlarına böl
    for (let i = 0; i + 16 <= hex.length; i += 16) {
      const w = hex.substring(i, i + 16);
      // kolonlu format: aa:bb:cc:dd:ee:ff:00:11
      result.push(w.match(/.{2}/g).join(':'));
    }
  });
  return result;
}

function parseLunGroups(text) {
  return parseCSV(text)
    .filter(r => (r['Lun Group Name'] || '').trim() !== '')
    .map(r => ({
      location: r['Lokasyon'],
      cabinet:  r['Kabinet'],
      name:     r['Lun Group Name'],
      capacity: toN(r['Total Capacity (TB)']),
      lunCount: parseInt(r['LUN Count']) || 0,
    }));
}

async function loadCSVs() {
  setOverlay(true, '<div class="spinner"></div><div class="loading-text">CSV Dosyalari Yukleniyor</div>');
  const fetchCSV = fetchCSVText;

  const [dashText, hostText, lunText, snapText, nasText, hmText] = await Promise.all([
    fetchCSV(CSV_DASHBOARD), fetchCSV(CSV_HOSTS),
    fetchCSV(CSV_LUNGROUPS), fetchCSV(CSV_SNAPSHOT),
    fetchCSV(CSV_NAS),       fetchCSV(CSV_HYPERMETRO),
  ]);

  cabinets  = parseDashboard(dashText);
  hosts     = parseHosts(hostText);
  lunGroups = parseLunGroups(lunText);
  snapshots = parseSnapshots(snapText);
  nasData   = parseNAS(nasText);
  hmData    = parseHyperMetro(hmText);
  setOverlay(false);

  if (cabinets.length === 0 && hosts.length === 0 && lunGroups.length === 0) {
    document.getElementById('header-summary').textContent = 'Veri bulunamadi';
    return;
  }
  initDashboard();
}

function setOverlay(show, html) {
  const el = document.getElementById('loading-overlay');
  el.style.display = show ? 'flex' : 'none';
  if (show && html) el.innerHTML = html;
}

function initDashboard() {
  const locCount = [...new Set(cabinets.map(c => c.location))].length;
  document.getElementById('header-summary').textContent =
    `${cabinets.length} Kabinet · ${locCount} Lokasyon`;
  buildSummary();
  buildOverview();
  populateFilters();
  renderHostTable();
  renderLunTable();
}

const dotColors = { vmware:'#4b9fe8', linux:'#4be8a0', aix:'#e8b84b', windows:'#e87a4b' };
const osBarMap  = { 'VMware ESX':'os-vmware', Linux:'os-linux', AIX:'os-aix', Windows:'os-windows' };

function barClass(p) { return p<30?'bar-low':p<50?'bar-mid':p<65?'bar-high':'bar-crit'; }
function pctColor(p) { return p<30?'var(--accent3)':p<50?'var(--accent)':p<65?'var(--warn)':'var(--danger)'; }
function statusBadge(p) {
  if (p<50) return '<span class="status-badge badge-ok">OK</span>';
  if (p<65) return '<span class="status-badge badge-warn">WARN</span>';
  return '<span class="status-badge badge-err">CRITICAL</span>';
}
function osTagClass(os) { return 'tag-' + ({ 'Linux':'linux','Windows':'windows','VMware ESX':'vmware','AIX':'aix' }[os] || 'linux'); }
function fmt(n) { return typeof n==='number' ? n.toFixed(2) : n; }

function buildSummary() {
  const v = cabinets.filter(c => !c.error);
  const totCap  = v.reduce((s,c)=>s+c.total, 0);
  const totUsed = v.reduce((s,c)=>s+c.used,  0);
  const totFree = v.reduce((s,c)=>s+c.free,  0);
  const totHost = v.reduce((s,c)=>s+c.hostCount, 0);
  const avgPct  = totCap>0 ? (totUsed/totCap*100).toFixed(1) : '0';
  const crit = v.filter(c=>c.pct>=65).length;
  const warn = v.filter(c=>c.pct>=50&&c.pct<65).length;
  const locs = [...new Set(cabinets.map(c=>c.location))].length;

  document.getElementById('global-summary').innerHTML = `
    <div class="stat-card gold"><div class="stat-label">Toplam Kapasite</div><div class="stat-value">${(totCap/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">${totCap.toFixed(0)} TB</div></div>
    <div class="stat-card blue"><div class="stat-label">Kullanilan</div><div class="stat-value">${(totUsed/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">Ort. %${avgPct}</div></div>
    <div class="stat-card green"><div class="stat-label">Bos Alan</div><div class="stat-value">${(totFree/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">${totFree.toFixed(0)} TB</div></div>
    <div class="stat-card ${crit>0?'red':'gold'}"><div class="stat-label">Alarm Durumu</div><div class="stat-value">${crit}<span class="stat-unit">kritik</span></div><div class="stat-sub">${warn} uyari</div></div>
    <div class="stat-card blue stat-card-click" id="stat-total-hosts"><div class="stat-label">Toplam Host</div><div class="stat-value">${totHost}</div><div class="stat-sub">${locs} lokasyon &middot; tikla &rarr;</div></div>`;
  
  document.getElementById('stat-total-hosts')?.addEventListener('click', () => applyHostFilter({label:'Tum Hostlar'}));
}

function cabinetCard(c) {
  if (c.error) return `
    <div class="cabinet-card error">
      <div class="card-header"><div><div class="card-name">${c.name}</div><div class="card-ip">${c.location}</div></div><span class="status-badge badge-err">ERROR</span></div>
      <div class="error-overlay">! Baglanti Hatasi</div>
    </div>`;

  const osKeys = Object.keys(c.os);
  const totOS  = osKeys.reduce((s,k)=>s+c.os[k], 0);
  const osBars = osKeys.map(k => `<div class="os-bar-wrap"><div class="os-bar ${osBarMap[k]||'os-linux'}" style="height:${totOS>0?c.os[k]/totOS*100:0}%"></div></div>`).join('');
  const osLegend = osKeys.map(k => {
    const safeK = k.replace(/'/g, "\\'");
    return `<div class="os-legend-item os-legend-clickable" data-cab="${esc(c.name)}" data-os="${esc(safeK)}"><div class="os-dot" style="background:${dotColors[(osBarMap[k]||'os-linux').replace('os-','')]}"></div><span>${k}: ${c.os[k]}</span></div>`;
  }).join('');

  return `
    <div class="${c.pct>=65?'cabinet-card warn-high':'cabinet-card'} cabinet-card-click" data-cab="${esc(c.name)}">
      <div class="card-header"><div><div class="card-name">${c.name}</div><div class="card-ip">${c.location} · ${c.ip}</div></div>${statusBadge(c.pct)}</div>
      <div class="card-body">
        <div class="cap-row"><span class="cap-label">Doluluk</span><span class="cap-pct" style="color:${pctColor(c.pct)}">%${c.pct}</span></div>
        <div class="bar-track"><div class="bar-fill ${barClass(c.pct)}" style="width:${c.pct}%"></div></div>
        <div class="metrics-row">
          <div class="metric"><div class="metric-val">${fmt(c.total)}</div><div class="metric-lbl">Total</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.used)}</div><div class="metric-lbl">Used</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.subscribed)}</div><div class="metric-lbl">Sub</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.free)}</div><div class="metric-lbl">Free</div></div>
        </div>
        <div class="os-section">
          <div class="os-title">OS Dagilimi · ${totOS} Host</div>
          <div class="os-bars">${osBars}</div>
          <div class="os-legend">${osLegend}</div>
        </div>
      </div>
      <div class="card-footer"><span class="footer-dr">DR ${c.dr}</span><span class="footer-ver">${c.version}</span></div>
    </div>`;
}

function buildOverview() {
  const locs = [...new Set(cabinets.map(c=>c.location))].sort();
  const container = document.getElementById('location-blocks');
  container.innerHTML = locs.map(loc => {
    const lc = cabinets.filter(c=>c.location===loc);
    return `
      <div class="location-block">
        <div class="location-header"><div class="location-tag">${loc}</div><div class="location-line"></div></div>
        <div class="cabinet-grid">${lc.map(c=>cabinetCard(c)).join('')}</div>
      </div>`;
  }).join('');

  container.querySelectorAll('.cabinet-card-click').forEach(card => {
    card.addEventListener('click', (e) => {
      const osItem = e.target.closest('.os-legend-clickable');
      if (osItem) {
        e.stopPropagation();
        applyHostFilter({
          label: `${osItem.dataset.cab} - ${osItem.dataset.os}`,
          cabinet: osItem.dataset.cab,
          os: osItem.dataset.os
        });
        return;
      }
      const cab = card.dataset.cab;
      applyHostFilter({label: `${cab} - Tum Hostlar`, cabinet: cab});
    });
  });
}

function populateFilters() {
  function fill(id, values) {
    const sel = document.getElementById(id);
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first;
    [...new Set(values)].filter(v => v).sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }
  fill('host-location', hosts.map(h=>h.location));
  fill('host-cabinet',  hosts.map(h=>h.cabinet));
  fill('lun-location',  lunGroups.map(l=>l.location));
  fill('lun-cabinet',   lunGroups.map(l=>l.cabinet));
}

let hostSort = { col:'host', dir:'asc' };
function renderHostTable() {
  const search = document.getElementById('host-search').value.toLowerCase();
  const loc = document.getElementById('host-location').value;
  const cab = document.getElementById('host-cabinet').value;
  const os = document.getElementById('host-os').value;
  const map = document.getElementById('host-map').value;

  let data = hosts.filter(h =>
    (!search || h.host.toLowerCase().includes(search)) &&
    (!loc || h.location === loc) &&
    (!cab || h.cabinet === cab) &&
    (!os || h.os === os) &&
    (!map || h.map === map)
  );
  data.sort((a,b) => (hostSort.dir === 'asc' ? 1 : -1) * ((a[hostSort.col] ?? '') < (b[hostSort.col] ?? '') ? -1 : 1));

  const tbody = data.map((h, idx) => {
    const hasWwns = h.wwns && h.wwns.length > 0;
    const cellClass = hasWwns ? 'wwn-cell-clickable' : '';
    const dataIdx = hasWwns ? `data-idx="${idx}"` : '';
    const title = hasWwns ? 'title="Tikla ve kopyala"' : '';
    const provStr = h.provTB > 0
      ? `<span class="sp-accent3 sp-fw-500">${h.provTB.toFixed(2)}</span>`
      : `<span class="sp-dim">—</span>`;
    return `
    <tr>
      <td>${h.location}</td>
      <td>${h.cabinet}</td>
      <td class="sp-bright">${h.host}</td>
      <td><span class="tag-os ${osTagClass(h.os)}">${h.os}</span></td>
      <td><span class="map-status ${h.map === 'Mapped' ? 'mapped' : 'unmapped'}">${h.map}</span></td>
      <td class="sp-right">${provStr}</td>
      <td class="${cellClass}" ${title} ${dataIdx}>${formatWwnCell(h.wwns)}</td>
    </tr>`;
  }).join('');

  window._renderedHostData = data;

  const mappedHosts = data.filter(h => h.map === 'Mapped');
  const totalProv = mappedHosts.reduce((s, h) => s + (h.provTB || 0), 0);
  const summaryHtml = mappedHosts.length > 0
    ? `<span class="sp-fs-11 sp-dim sp-ml-14" style="margin-right:12px">
        ${mappedHosts.length} Mapped host &nbsp;·&nbsp;
        Toplam: <strong class="sp-accent3">${totalProv.toFixed(2)} TB</strong>
       </span>
       <button id="btn-export-mapped" class="sp-export-btn">
         &#8615; Mapped Export
       </button>`
    : '';

  const wrap = document.getElementById('host-table-wrap');
  wrap.innerHTML = `
    <div class="sp-table-header">
      ${summaryHtml}
    </div>
    <table>
      <thead><tr>
        <th class="sp-pointer" data-sort="location">Lokasyon</th>
        <th class="sp-pointer" data-sort="cabinet">Kabinet</th>
        <th class="sp-pointer" data-sort="host">Host Name</th>

function formatWwnCell(wwns) {

  const first = wwns[0];
  const short = first.length >= 16 ? first.substring(0, 6) + '…' + first.substring(first.length - 4) : first;
  const extra = wwns.length > 1 ? `<span class="wwn-extra">+${wwns.length - 1}</span>` : '';
  return `<span class="sp-wwn-cell">${short}</span>${extra}`;
}

/**
 * Mapped host'ları CSV olarak indir.
 * Mevcut filtreli tablodaki Mapped host'ları alır.
 * vendor: 'huawei' | 'pmax'
 */
function exportMappedHosts(vendor) {
  const data = (window._renderedHostData || []).filter(h => h.map === 'Mapped');
  if (data.length === 0) {
    alert('Görünümde Mapped host yok.');
    return;
  }

  const bom = '\uFEFF'; // Excel UTF-8 uyumluluğu
  const cols = vendor === 'pmax'
    ? ['Lokasyon','Array ID','Host Name','OS','Provisioned (TB)','Masking View','Storage Group','Host WWN']
    : ['Lokasyon','Kabinet','Host Name','OS','Provisioned (TB)','Host WWN'];
  
  const rows = data.map(h => {
    const wwns = (h.wwns || []).join(' | ');
    if (vendor === 'pmax') {
      return [h.location, h.cabinet, h.host, h.os,
              h.provTB ? h.provTB.toFixed(2) : '0',
              h.maskingView || '', h.storageGroup || '', wwns]
        .map(v => `"${String(v).replace(/"/g,'""')}"`)
        .join(',');
    }
    return [h.location, h.cabinet, h.host, h.os,
            h.provTB ? h.provTB.toFixed(2) : '0', wwns]
      .map(v => `"${String(v).replace(/"/g,'""')}"`)
      .join(',');
  });

  const today = new Date().toISOString().split('T')[0];
  const cab   = document.getElementById('host-cabinet').value || 'tum';
  const fname = `${vendor}_mapped_hosts_${cab}_${today}.csv`;
  const csv   = bom + cols.join(',') + '\r\n' + rows.join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

let currentWwns = [];
let currentWwnFormat = 'colon';

function openWwnModalByIdx(idx) {
  const h = window._renderedHostData && window._renderedHostData[idx];
  if (!h || !h.wwns || h.wwns.length === 0) return;
  openWwnModal(h.host, h.cabinet, h.wwns);
}

function openWwnModal(hostName, cabinet, wwns) {
  if (!wwns || wwns.length === 0) return;
  currentWwns = wwns;
  document.getElementById('modalHostName').textContent = `${cabinet} / ${hostName}  ·  ${wwns.length} WWN`;
  renderWwnList();
  document.getElementById('wwnModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeWwnModal() {
  document.getElementById('wwnModal').classList.remove('show');
  document.body.style.overflow = '';
}

function setWwnFormat(fmt) {
  currentWwnFormat = fmt;
  document.getElementById('fmtColon').classList.toggle('active', fmt === 'colon');
  document.getElementById('fmtPlain').classList.toggle('active', fmt === 'plain');
  renderWwnList();
}

function formatWwn(raw, fmt) {
  if (raw.startsWith('iqn:')) return raw.substring(4);  // iSCSI IQN olarak goster
  const clean = raw.replace(/[:-]/g, '').toLowerCase();
  if (fmt === 'plain') return clean;
  // colon format: aa:bb:cc:dd:ee:ff:gg:hh
  return clean.match(/.{1,2}/g).join(':');
}

function renderWwnList() {
  const list = document.getElementById('wwnList');
  list.innerHTML = currentWwns.map((w, i) => {
    const formatted = formatWwn(w, currentWwnFormat);
    return `
      <div class="wwn-row">
        <span class="wwn-index">${i + 1}.</span>
        <span class="wwn-value">${formatted}</span>
        <button class="wwn-copy-btn" data-idx="${i}">Kopyala</button>
      </div>`;
  }).join('');

  list.querySelectorAll('.wwn-copy-btn').forEach(btn => {
    btn.addEventListener('click', () => copyOne(btn, parseInt(btn.dataset.idx)));
  });
}

function copyOne(btn, idx) {
  const text = formatWwn(currentWwns[idx], currentWwnFormat);
  copyToClipboard(text).then(() => {
    btn.textContent = 'Kopyalandi';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAllWwns() {
  const text = currentWwns.map(w => formatWwn(w, currentWwnFormat)).join('\n');
  copyToClipboard(text).then(() => {
    // Tüm row'ların kopya butonlarını flash et
    document.querySelectorAll('.wwn-copy-btn').forEach(b => {
      b.textContent = 'Kopyalandi'; b.classList.add('copied');
      setTimeout(() => { b.textContent = 'Kopyala'; b.classList.remove('copied'); }, 1500);
    });
  });
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback: textarea hack
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    resolve();
  });
}

    <div class="sp-stat-box sp-border-blue">
      <div class="sp-stat-label">Toplam Çift</div>
      <div class="sp-stat-value">${data.length}</div>
    </div>
    <div class="sp-stat-box sp-border-green">
      <div class="sp-stat-label">Normal / Sync</div>
      <div class="sp-stat-value sp-accent3">${normal}</div>
    </div>
    <div class="sp-stat-box ${syncing > 0 ? 'sp-border-blue' : ''}">
      <div class="sp-stat-label">Senkronize Ediliyor</div>
      <div class="sp-stat-value ${syncing > 0 ? 'sp-accent2' : 'sp-dim'}">${syncing}</div>
    </div>
    <div class="sp-stat-box ${problem > 0 ? 'sp-border-danger' : ''}">
      <div class="sp-stat-label">Sorun / Duraklatıldı</div>
      <div class="sp-stat-value ${problem > 0 ? 'sp-danger' : 'sp-dim'}">${problem}</div>
      ${problem > 0 ? '<div class="sp-fs-10 sp-danger sp-mt-3">⚠ Dikkat!</div>' : ''}
    </div>`;

  if (data.length === 0) {
    el.innerHTML = spEmptyState({type:'no-filter',title:'Eşleşen çift yok',message:'HyperMetro filtre kriterlerini değiştirmeyi deneyin.'});
    return;
  }

  const rows = data.map(r => {
    const syncBadge = r.syncPct ? `<span class="sp-badge-blue">${esc(r.syncPct)}</span>` : '';
    return `<tr>
      <td class="sp-dim-sm">${esc(r.kabinet)}</td>
      <td class="sp-bright-md">${esc(r.yerelLun)}</td>
      <td class="sp-accent2">${esc(r.uzakLun)}</td>
      <td class="sp-dim-sm">${esc(r.uzakKabinet)}</td>
      <td class="sp-dim-sm">${esc(r.domain)}</td>
      <td><span class="sp-fs-10 ${hmStatusClass(r.durum)}">${esc(r.durum)}</span> ${syncBadge}</td>
      <td class="sp-right sp-accent2">${r.capTB > 0 ? r.capTB.toFixed(3) + ' TB' : '—'}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="sp-table-info sp-flex sp-between">
      <span>${data.length} çift</span>
      <span>Toplam: <strong class="sp-accent3">${totalCap.toFixed(2)} TB</strong></span>
    </div>
    <table>
      <thead><tr>
        <th>Kabinet</th>
        <th>Yerel LUN</th>
        <th>Uzak LUN</th>
        <th>Uzak Kabinet</th>
        <th>Domain</th>
        <th>Durum</th>
        <th class="sp-right">Kapasite</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ========================================================
   DRILL-DOWN: kabinet kart -> host listesi filter
   ======================================================== */
function applyHostFilter(opts) {
  // opts: { location?, cabinet?, os?, map?, search?, label? }
  document.getElementById('host-search').value   = opts.search   || '';
  document.getElementById('host-location').value = opts.location || '';
  document.getElementById('host-cabinet').value  = opts.cabinet  || '';
  document.getElementById('host-os').value       = opts.os       || '';
  document.getElementById('host-map').value      = opts.map      || '';
  
  renderHostFilterChips(opts);
  switchTab('hosts');
  renderHostTable();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function renderHostFilterChips(opts) {
  const box = document.getElementById('hostFilterChips');
  if (!box) return;
  const chips = [];
  if (opts.label)    chips.push({ key:'label', val:opts.label });
  if (opts.location) chips.push({ key:'Lokasyon', val:opts.location });
  if (opts.cabinet)  chips.push({ key:'Kabinet',  val:opts.cabinet  });
  if (opts.os)       chips.push({ key:'OS',       val:opts.os       });
  if (opts.map)      chips.push({ key:'Durum',    val:opts.map      });
  
  if (chips.length === 0) {
    box.innerHTML = ''; box.style.display = 'none';
    return;
  }
  box.style.display = 'flex';
  box.innerHTML = chips.map(c =>
    `<span class="filter-chip">${c.key === 'label' ? `<strong>${c.val}</strong>` : `${c.key}: <strong>${c.val}</strong>`}</span>`
  ).join('') + `<button class="filter-chip-clear">Temizle</button>`;
}

function clearHostFilters() {
  document.getElementById('host-search').value   = '';
  document.getElementById('host-location').value = '';
  document.getElementById('host-cabinet').value  = '';
  document.getElementById('host-os').value       = '';
  document.getElementById('host-map').value      = '';
  renderHostFilterChips({});
  renderHostTable();
}

document.querySelectorAll('#tab-hosts .filter-select, #tab-hosts input').forEach(el => {
  el.addEventListener(el.tagName === 'INPUT' ? 'input' : 'change', el.tagName === 'INPUT' ? debounce(renderHostTable) : renderHostTable);

document.querySelectorAll('#tab-nas .filter-select, #tab-nas input').forEach(el => {

document.querySelectorAll('#tab-hypermetro .filter-select, #tab-hypermetro input').forEach(el => {
