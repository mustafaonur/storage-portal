<!DOCTYPE html>
<html lang="tr">
<head>
<link rel="stylesheet" href="./assets/css/storage-styles.css">
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="view-transition" content="same-origin">
<title>Cabinet Finder · Storage Portal</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(30,45,68,.3) 1px,transparent 1px), linear-gradient(90deg,rgba(30,45,68,.3) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  /* SHELL */
  .shell { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:24px; }
/* HEADER */
  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand-icon { width:42px; height:42px; border:2px solid var(--accent); display:grid; place-items:center; animation:pulse-border 3s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100%{ box-shadow:0 0 0 0 rgba(232,184,75,.4); } 50%{ box-shadow:0 0 0 6px rgba(232,184,75,0); } }
  .brand-icon svg { width:22px; height:22px; stroke:var(--accent); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .brand-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text-bright); letter-spacing:-.5px; }
  .brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
  .header-meta { text-align:right; font-size:11px; color:var(--text-dim); line-height:1.8; }
  .live-dot { display:inline-block; width:6px; height:6px; background:var(--accent3); border-radius:50%; margin-right:6px; animation:blink 2s ease-in-out infinite; vertical-align:middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* STATUS BAR */
  .status-bar {
    display:flex; align-items:center; gap:14px;
    padding:12px 18px;
    background:var(--surface);
    border:1px solid var(--border);
    margin-bottom:24px;
    position:relative;
    overflow:hidden;
  }
  .status-bar::before {
    content:''; position:absolute; top:0; left:0;
    width:3px; height:100%;
    background:var(--accent2);
    transition:background .2s;
  }
  .status-bar.ok::before    { background:var(--accent3); }
  .status-bar.error::before { background:var(--danger); }
  .status-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--text-dim); flex-shrink:0;
    transition:background .3s, box-shadow .3s;
  }
  .status-dot.loading { background:var(--accent2); animation:pulse 1.2s ease infinite; box-shadow:0 0 8px var(--accent2); }
  .status-dot.ok      { background:var(--accent3); box-shadow:0 0 8px var(--accent3); }
  .status-dot.error   { background:var(--danger);  box-shadow:0 0 8px var(--danger); }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  .status-text { flex:1; font-size:11px; letter-spacing:1px; color:var(--text-dim); }
  .status-text.ok    { color:var(--accent3); }
  .status-text.error { color:var(--danger); }
  .reload-btn {
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    padding:5px 12px;
    cursor:pointer;
    letter-spacing:1.5px;
    text-transform:uppercase;
    transition:all .2s;
  }
  .reload-btn:hover { border-color:var(--accent2); color:var(--accent2); }

  /* SEARCH */
  .search-wrap { margin-bottom:20px; }
  .search-label {
    font-size:10px; letter-spacing:3px;
    color:var(--text-dim); text-transform:uppercase;
    display:block; margin-bottom:10px;
  }
  .search-row { position:relative; }
  .search-input {
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-bright);
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    padding:14px 50px 14px 18px;
    outline:none;
    transition:all .25s;
    letter-spacing:.5px;
  }
  .search-input::placeholder { color:var(--text-dim); }
  .search-input:focus {
    border-color:var(--accent2);
    box-shadow:0 0 0 3px rgba(75,159,232,.1);
  }
  .search-input:disabled { opacity:.4; cursor:not-allowed; }
  .search-icon {
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    color:var(--text-dim); font-size:16px; pointer-events:none;
  }

  /* STATS BAR */
  .stats-bar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
    font-size:10px; letter-spacing:2px;
    color:var(--text-dim); text-transform:uppercase;
  }
  .count-badge {
    background:rgba(75,159,232,.12);
    border:1px solid rgba(75,159,232,.3);
    color:var(--accent2);
    padding:3px 10px;
    font-size:11px; font-weight:500;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:1px;
  }

  /* TABLE */
  .table-wrap {
    background:var(--surface);
    border:1px solid var(--border);
    overflow:hidden;
  }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th {
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    padding:12px 18px;
    text-align:left;
    font-size:10px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:500;
  }
  tbody tr {
    border-bottom:1px solid rgba(30,45,68,.6);
    transition:background .15s;
  }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:11px 18px; color:var(--text); }
  tbody td:first-child { color:var(--text-bright); font-weight:500; }
  tbody td:last-child  { color:var(--text-dim); font-size:11px; }

  mark {
    background:rgba(232,184,75,.25);
    color:var(--accent);
    padding:0 2px;
    border-radius:2px;
  }

  /* CENTER STATE (empty / error / loading) */
  .center-state {
    text-align:center;
    padding:60px 20px;
    color:var(--text-dim);
  }
  .center-state .icon {
    font-size:32px;
    margin-bottom:14px;
    opacity:.6;
  }
  .center-state p {
    font-size:12px;
    line-height:2;
    letter-spacing:.5px;
  }
  .center-state strong { color:var(--accent2); }
  .center-state .err   { color:var(--danger); }
  .center-state .hint  { font-size:10px; margin-top:8px; opacity:.6; letter-spacing:1px; text-transform:uppercase; }

  /* FOOTER */
  .dash-footer {
    margin-top:40px;
    padding-top:16px;
    border-top:1px solid var(--border);
    display:flex; justify-content:space-between;
    font-size:10px; color:var(--text-dim);
    letter-spacing:1px;
  }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent2); }
</style>
</head>
<body>

<div class="shell">

<header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Cabinet Finder</div>
        <div class="brand-sub">Inventory Search Tool</div>
      </div>
    </div>
    <div class="header-meta">
      <div><span class="live-dot"></span>INVENTORY SYSTEM</div>
      <div id="clock">--:--:--</div>
      <div id="record-count" style="color:var(--text);">-</div>
    </div>
  </header>

  <div class="status-bar" id="statusBar">
    <div class="status-dot loading" id="statusDot"></div>
    <span class="status-text" id="statusText">CSV yukleniyor...</span>
    <button class="reload-btn" id="btn-reload">&#8634; Yenile</button>
  </div>

  <div class="search-wrap">
    <label class="search-label" for="searchBox">Hostname Ara</label>
    <div class="search-row">
      <input type="text" id="searchBox" class="search-input"
             placeholder="orn: stoprdapp" autocomplete="off" spellcheck="false" disabled>
      <span class="search-icon">&#9906;</span>
    </div>
  </div>

  <div class="stats-bar">
    <span id="statsLabel">-- kayit</span>
    <span class="count-badge" id="countBadge">0</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Hostname</th>
          <th>Location</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="2">
          <div class="center-state">
            <div class="icon">&#9203;</div>
            <p>Veri yukleniyor...</p>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="dash-footer">
    <span>CABINET FINDER · HOST INVENTORY</span>
    <span>STORAGE PORTAL v2.0</span>
  </div>
</div>

<script src="./assets/js/storage-utils.js"></script>
<script src="./assets/js/nav.js"></script>
<script>
var CSV_PATH = "data/Cabinet-Finder/all.csv";
var allRows = [];

var searchBox  = document.getElementById('searchBox');
var tableBody  = document.getElementById('tableBody');
var statsLabel = document.getElementById('statsLabel');
var countBadge = document.getElementById('countBadge');
var statusBar  = document.getElementById('statusBar');
var statusDot  = document.getElementById('statusDot');
var statusText = document.getElementById('statusText');
var recordCount= document.getElementById('record-count');

/* CLOCK */
(function(){
  function tick(){
    var now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('tr-TR') + ' · ' + now.toLocaleTimeString('tr-TR');
  }
  tick(); setInterval(tick, 1000);
})();

function loadCSV() {
  setStatus('loading', 'CSV yukleniyor...');
  searchBox.disabled = true;
  searchBox.value = '';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', CSV_PATH + '?_=' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var text = xhr.responseText;
      if (!text.trim()) {
        setStatus('error', 'CSV dosyasi bos.');
        showError('CSV dosyasi bos.');
        return;
      }
      parseCSV(text);
      var saat = new Date().toLocaleTimeString('tr-TR');
      setStatus('ok', allRows.length + ' kayit yuklendi · ' + saat);
      recordCount.textContent = allRows.length.toLocaleString('tr-TR') + ' kayit';
      searchBox.disabled = false;
      searchBox.focus();
    } else {
      var msg = 'HTTP ' + xhr.status + ' - dosya bulunamadi: ' + CSV_PATH;
      setStatus('error', msg);
      showError(msg);
    }
  };
  xhr.onerror = function() {
    var msg = 'Baglanti hatasi. all.csv ayni klasorde mi?';
    setStatus('error', msg);
    showError(msg);
  };
  xhr.send();
}

function showPrompt() {
  tableBody.innerHTML =
    '<tr><td colspan="2"><div class="center-state">' +
    '<div class="icon">&#9906;</div>' +
    '<p>Aramak istediginiz <strong>hostname</strong>\'i yazin.</p>' +
    '</div></td></tr>';
}

function showError(msg) {
  tableBody.innerHTML =
    '<tr><td colspan="2"><div class="center-state">' +
    '<div class="icon">!</div>' +
    '<p class="err">' + escapeHtml(msg) + '</p>' +
    '<p class="hint">all.csv dosyasinin index.html ile ayni klasorde oldugunu kontrol edin.</p>' +
    '</div></td></tr>';
}

function setStatus(state, msg) {
  statusBar.className = 'status-bar ' + (state === 'ok' ? 'ok' : state === 'error' ? 'error' : '');
  statusDot.className = 'status-dot ' + state;
  statusText.className = 'status-text ' + (state === 'error' ? 'error' : state === 'ok' ? 'ok' : '');
  statusText.textContent = msg;
}

function parseCSV(text) {
  var filtered = text.split('\n').filter(function(l) { return l.trim() !== ''; });
  allRows = [];
  var start = isHeader(filtered[0]) ? 1 : 0;

  for (var i = start; i < filtered.length; i++) {
    var cols = splitCSVLine(filtered[i]);
    if (cols.length >= 2) {
      allRows.push({ hostname: cols[0].trim(), location: cols[1].trim() });
    }
  }

  showPrompt();
}

function isHeader(line) {
  if (!line) return false;
  var first = splitCSVLine(line)[0].toLowerCase().trim();
  return first === 'hostname' || first === 'host' || first === 'name' || first === 'server';
}

function splitCSVLine(line) {
  var result = [];
  var cur = '';
  var inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

searchBox.addEventListener('input', function() {
  var q = searchBox.value.trim();
  var filtered = [];

  if (q) {
    var lower = q.toLowerCase();
    for (var i = 0; i < allRows.length; i++) {
      if (allRows[i].hostname.toLowerCase().indexOf(lower) !== -1) {
        filtered.push(allRows[i]);
      }
    }
  } else {
    showPrompt();
    updateStats(0);
    return;
  }

  renderTable(filtered, q);
});

function renderTable(rows, query) {
  updateStats(rows.length);

  if (rows.length === 0 && allRows.length > 0) {
    tableBody.innerHTML =
      '<tr><td colspan="2"><div class="center-state">' +
      '<div class="icon">&#9906;</div>' +
      '<p>Sonuc bulunamadi.<br><strong>' + escapeHtml(query) + '</strong> ile eslesen hostname yok.</p>' +
      '</div></td></tr>';
    return;
  }

  if (rows.length === 0) {
    tableBody.innerHTML =
      '<tr><td colspan="2"><div class="center-state"><div class="icon">[ ]</div><p>Veri yok.</p></div></td></tr>';
    return;
  }

  var html = '';
  for (var i = 0; i < rows.length; i++) {
    html += '<tr><td>' + highlight(rows[i].hostname, query) + '</td><td>' + escapeHtml(rows[i].location) + '</td></tr>';
  }
  tableBody.innerHTML = html;
}

function highlight(text, query) {
  var esc = escapeHtml(text);
  if (!query) return esc;
  var lowerEsc = esc.toLowerCase();
  var lowerQ = escapeHtml(query).toLowerCase();
  var result = '';
  var idx = 0;
  while (idx < esc.length) {
    var found = lowerEsc.indexOf(lowerQ, idx);
    if (found === -1) { result += esc.slice(idx); break; }
    result += esc.slice(idx, found);
    result += '<mark>' + esc.slice(found, found + lowerQ.length) + '</mark>';
    idx = found + lowerQ.length;
  }
  return result;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function updateStats(count) {
  statsLabel.textContent = count.toLocaleString('tr-TR') + ' kayit gosteriliyor';
  countBadge.textContent = count.toLocaleString('tr-TR');
}

loadCSV();

  StorageNav.init({ title: "Cabinet Finder", section: "tools" });

/* ════════════ EVENT DELEGATION — cabinet-finder.html ════════════ */
(function wireEvents() {
  const btn = document.getElementById('btn-reload');
  if (btn) btn.addEventListener('click', loadCSV);
})();

</script>
</body>
</html>
