        <span class="search-icon">⌕</span>

        <option value="">Tüm Protokoller</option>

    <div id="hd-table-wrap"></div>

    </div>
    <div class="modal-actions">

<script>
let cabinets  = [];
let hosts     = [];
let lunGroups = [];

const CSV_DASHBOARD = './data/Pure/Pure_Dashboard.csv';
const CSV_HOSTS     = './data/Pure/Pure_Host.csv';
const CSV_LUNGROUPS = './data/Pure/Pure_Volume.csv';
const CSV_CAPACITY  = './data/Pure/Pure_Capacity_Dashboard.csv';   // Data reduction per array
const CSV_HOSTDET   = './data/Pure/Pure_Host_Details.csv';         // IQN/WWN detail per host

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleDateString('tr-TR') + ' · ' + new Date().toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();


function parseDashboard(text) {
  const skip = ['---', '==='];
  return parseCSV(text)
    .filter(r => {
      const k = (r['Kabinet'] || '').trim();
      const l = (r['Lokasyon'] || '').trim();
      if (!k) return false;
      if (skip.includes(l)) return false;
      if (/^TOPLAM|^GENEL/i.test(k)) return false;
      return true;
    })
    .map(r => {
      const ip  = (r['IP'] || '').trim();
      const tot = (r['Total (TB)'] || '').trim();
      const isErr = ip === 'HATA' || tot === '' || tot === '-' || tot.toUpperCase() === 'HATA';

      if (isErr) return { location:r['Lokasyon'], name:r['Kabinet'], ip, error:true };

      const osObj = {};
      (r['OS Dagilimi'] || '').split('|').forEach(p => {
        const m = p.trim().match(/^(.+?):\s*(\d+)$/);
        if (m) osObj[m[1].trim()] = parseInt(m[2]);
      });

      return {
        location:   r['Lokasyon'],
        name:       r['Kabinet'],
        ip,
        total:      toN(r['Total (TB)']),
        used:       toN(r['Used (TB)']),
        subscribed: toN(r['Subscribed (TB)']),
        free:       toN(r['Free (TB)']),
        pct:        toN(r['Doluluk (%)']),
        dr:         (r['Data Reduction'] || '-').trim(),
        hostCount:  parseInt(r['Host Sayisi']) || 0,
        os:         osObj,
        version:    (r['Versiyon'] || '').trim(),
      };
    });
}

function parseHosts(text) {
  return parseCSV(text)
    .filter(r => (r['Host Name'] || '').trim() !== '')
    .map(r => {
      const proto = (r['Protocol'] || 'FC').trim();
      const rawWwn = r['Host WWN'] || '';
      // iSCSI ise IQN'ler pipe ayrilmis string olarak gelir, expandWwns kullanma
      const wwns = proto === 'iSCSI'
        ? rawWwn.split('|').map(s => s.trim()).filter(s => s)
        : expandWwns(rawWwn);
      return {
        location:  r['Lokasyon'],
        cabinet:   r['Kabinet'],
        host:      r['Host Name'],
        os:        r['OS'],
        hostGroup: (r['Host Group'] || '').trim(),
        protocol:  proto,
        // Map Durumu Pure'da yok; provTB > 0 ise "Mapped" varsay
        map:       (toN(r['Provisioned (TB)']) > 0) ? 'Mapped' : 'Unmapped',
        provTB:    toN(r['Provisioned (TB)']),
        wwns:      wwns,
      };
    });
}

// Pipe-ayrılmış WWN listesini parse et; birleşik 32-hex'leri de ayır
function expandWwns(raw) {
  const result = [];
  (raw || '').split('|').forEach(chunk => {
    const hex = chunk.trim().toLowerCase().replace(/[^0-9a-f]/g, '');
    if (hex.length === 0) return;
    // 16'nın katlarına böl
    for (let i = 0; i + 16 <= hex.length; i += 16) {
      const w = hex.substring(i, i + 16);
      // kolonlu format: aa:bb:cc:dd:ee:ff:00:11
      result.push(w.match(/.{2}/g).join(':'));
    }
  });
  return result;
}

function parseLunGroups(text) {
  return parseCSV(text)
    .filter(r => (r['Volume'] || r['Lun Group Name'] || '').trim() !== '')
    .map(r => ({
      location: r['Lokasyon'],
      cabinet:  r['Kabinet'],
      name:     (r['Volume'] || r['Lun Group Name']).trim(),
      capacity: toN(r['Size (TB)'] || r['Total Capacity (TB)']),
      lunCount: parseInt(r['LUN Count']) || 0,
      serial:   r['Serial'] || '',
    }));
}

async function loadCSVs() {
  setOverlay(true, '<div class="spinner"></div><div class="loading-text">CSV Dosyalari Yukleniyor</div>');
  try {
    const fetchCSV = fetchCSVText;
    const [dashText, hostText, lunText, capText, hdText] = await Promise.all([
      fetchCSV(CSV_DASHBOARD), fetchCSV(CSV_HOSTS), fetchCSV(CSV_LUNGROUPS),
      fetchCSVText(CSV_CAPACITY), fetchCSVText(CSV_HOSTDET),
    ]);
    cabinets      = parseDashboard(dashText);
    hosts         = parseHosts(hostText);
    lunGroups     = parseLunGroups(lunText);
    capacityDR    = parseCapacityDR(capText);
    hostDetailData= parseHostDetail(hdText);
    setOverlay(false);
    initDashboard();
  } catch (err) {
    setOverlay(true, `
      <div style="text-align:center;max-width:500px;padding:32px">
        <div style="font-size:36px;color:var(--danger);margin-bottom:16px">!</div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;color:var(--text-bright);margin-bottom:12px">CSV Yuklenemedi</div>
        <div style="font-size:12px;color:var(--danger);padding:8px 14px;background:rgba(232,75,75,.1);border:1px solid rgba(232,75,75,.3);margin-bottom:20px">${err.message}</div>
        <button id="btn-retry-load" style="margin-top:24px;background:var(--accent);color:#000;border:none;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;padding:10px 24px;cursor:pointer">YENIDEN DENE</button>
      </div>`);
  }
}

function setOverlay(show, html) {
  const el = document.getElementById('loading-overlay');
  el.style.display = show ? 'flex' : 'none';
  if (show && html) el.innerHTML = html;
}

function initDashboard() {
  const locCount = [...new Set(cabinets.map(c => c.location))].length;
  document.getElementById('header-summary').textContent =
    `${cabinets.length} Kabinet · ${locCount} Lokasyon`;
  buildSummary();
  buildOverview();
  populateFilters();
  renderHostTable();
  renderLunTable();
}

const dotColors = { vmware:'#4b9fe8', linux:'#4be8a0', aix:'#e8b84b', windows:'#e87a4b' };
const osBarMap  = { 'VMware ESX':'os-vmware', Linux:'os-linux', AIX:'os-aix', Windows:'os-windows' };

function barClass(p) { return p<30?'bar-low':p<50?'bar-mid':p<65?'bar-high':'bar-crit'; }
function pctColor(p) { return p<30?'var(--accent3)':p<50?'var(--accent)':p<65?'var(--warn)':'var(--danger)'; }
function statusBadge(p) {
  if (p<50) return '<span class="status-badge badge-ok">OK</span>';
  if (p<65) return '<span class="status-badge badge-warn">WARN</span>';
  return '<span class="status-badge badge-err">CRITICAL</span>';
}
function osTagClass(os) { return 'tag-' + ({ 'Linux':'linux','Windows':'windows','VMware ESX':'vmware','AIX':'aix' }[os] || 'linux'); }
function fmt(n) { return typeof n==='number' ? n.toFixed(2) : n; }

function buildSummary() {
  const v = cabinets.filter(c => !c.error);
  const totCap  = v.reduce((s,c)=>s+c.total, 0);
  const totUsed = v.reduce((s,c)=>s+c.used,  0);
  const totFree = v.reduce((s,c)=>s+c.free,  0);
  const totHost = v.reduce((s,c)=>s+c.hostCount, 0);
  const avgPct  = totCap>0 ? (totUsed/totCap*100).toFixed(1) : '0';
  const crit = v.filter(c=>c.pct>=65).length;
  const warn = v.filter(c=>c.pct>=50&&c.pct<65).length;
  const locs = [...new Set(cabinets.map(c=>c.location))].length;

  document.getElementById('global-summary').innerHTML = `
    <div class="stat-card gold"><div class="stat-label">Toplam Kapasite</div><div class="stat-value">${(totCap/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">${totCap.toFixed(0)} TB</div></div>
    <div class="stat-card blue"><div class="stat-label">Kullanilan</div><div class="stat-value">${(totUsed/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">Ort. %${avgPct}</div></div>
    <div class="stat-card green"><div class="stat-label">Bos Alan</div><div class="stat-value">${(totFree/1024).toFixed(2)}<span class="stat-unit">PB</span></div><div class="stat-sub">${totFree.toFixed(0)} TB</div></div>
    <div class="stat-card ${crit>0?'red':'gold'}"><div class="stat-label">Alarm Durumu</div><div class="stat-value">${crit}<span class="stat-unit">kritik</span></div><div class="stat-sub">${warn} uyari</div></div>
    <div class="stat-card blue stat-card-click" data-host-filter='{"label":"Tum Hostlar"}'><div class="stat-label">Toplam Host</div><div class="stat-value">${totHost}</div><div class="stat-sub">${locs} lokasyon &middot; tikla &rarr;</div></div>`;
}

function cabinetCard(c) {
  if (c.error) return `
    <div class="cabinet-card error">
      <div class="card-header"><div><div class="card-name">${c.name}</div><div class="card-ip">${c.location}</div></div><span class="status-badge badge-err">ERROR</span></div>
      <div class="error-overlay">! Baglanti Hatasi</div>
    </div>`;

  const osKeys = Object.keys(c.os);
  const totOS  = osKeys.reduce((s,k)=>s+c.os[k], 0);
  const osBars = osKeys.map(k => `<div class="os-bar-wrap"><div class="os-bar ${osBarMap[k]||'os-linux'}" style="height:${totOS>0?c.os[k]/totOS*100:0}%"></div></div>`).join('');
  // OS legend tiklanabilir: o kabinet + o OS filtresi
  const osLegend = osKeys.map(k => {
    const safeK = k.replace(/'/g, "\\'");
    return `<div class="os-legend-item os-legend-clickable" data-host-filter='{"label":"${c.name} - ${k}","cabinet":"${c.name}","os":"${safeK}"}'><div class="os-dot" style="background:${dotColors[(osBarMap[k]||'os-linux').replace('os-','')]}"></div><span>${k}: ${c.os[k]}</span></div>`;
  }).join('');

  return `
    <div class="${c.pct>=65?'cabinet-card warn-high':'cabinet-card'} cabinet-card-click" data-host-filter='{"label":"${c.name} - ${c.name}","cabinet":"${c.name}"}'>
      <div class="card-header"><div><div class="card-name">${c.name}</div><div class="card-ip">${c.location} · ${c.ip}</div></div>${statusBadge(c.pct)}</div>
      <div class="card-body">
        <div class="cap-row"><span class="cap-label">Doluluk</span><span class="cap-pct" style="color:${pctColor(c.pct)}">%${c.pct}</span></div>
        <div class="bar-track"><div class="bar-fill ${barClass(c.pct)}" style="width:${c.pct}%"></div></div>
        <div class="metrics-row">
          <div class="metric"><div class="metric-val">${fmt(c.total)}</div><div class="metric-lbl">Total</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.used)}</div><div class="metric-lbl">Used</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.subscribed)}</div><div class="metric-lbl">Sub</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.free)}</div><div class="metric-lbl">Free</div></div>
        </div>
        <div class="os-section">
          <div class="os-title">OS Dagilimi · ${totOS} Host</div>
          <div class="os-bars">${osBars}</div>
          <div class="os-legend">${osLegend}</div>
        </div>
      </div>
      <div class="card-footer"><span class="footer-dr">DR ${c.dr}</span><span class="footer-ver">${c.version}</span></div>
    </div>`;
}

function buildOverview() {
  const locs = [...new Set(cabinets.map(c=>c.location))].sort();
  document.getElementById('location-blocks').innerHTML = locs.map(loc => {
    const lc = cabinets.filter(c=>c.location===loc);
    return `
      <div class="location-block">
        <div class="location-header"><div class="location-tag">${loc}</div><div class="location-line"></div></div>
        <div class="cabinet-grid">${lc.map(c=>cabinetCard(c)).join('')}</div>
      </div>`;
  }).join('');
}

function populateFilters() {
  function fill(id, values) {
    const sel = document.getElementById(id);
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first;
    [...new Set(values)].filter(v => v).sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }
  fill('host-location', hosts.map(h=>h.location));
  fill('host-cabinet',  hosts.map(h=>h.cabinet));
  fill('lun-location',  lunGroups.map(l=>l.location));
  fill('lun-cabinet',   lunGroups.map(l=>l.cabinet));
}

let hostSort = { col:'host', dir:'asc' };
function renderHostTable() {
  const search = document.getElementById('host-search').value.toLowerCase();
  const loc = document.getElementById('host-location').value;
  const cab = document.getElementById('host-cabinet').value;
  const os = document.getElementById('host-os').value;
  const map = document.getElementById('host-map').value;
  const proto = document.getElementById('host-protocol')?.value || '';

  let data = hosts.filter(h =>
    (!search || h.host.toLowerCase().includes(search)) &&
    (!loc || h.location===loc) &&
    (!cab || h.cabinet===cab) &&
    (!os || h.os===os) &&
    (!map || h.map===map) &&
    (!proto || h.protocol===proto)
  );
  data.sort((a,b) => (hostSort.dir==='asc'?1:-1)*((a[hostSort.col]??'')<(b[hostSort.col]??'')?-1:1));

  const tbody = data.map((h, idx) => {
    const hasWwns = h.wwns && h.wwns.length > 0;
    const cellClass = hasWwns ? 'wwn-cell-clickable' : '';
    const wwnDataAttr = hasWwns ? `data-wwn-idx="${idx}"` : '';
    const title = hasWwns ? 'title="Tikla ve kopyala"' : '';
    const provStr = h.provTB > 0
      ? `<span style="color:var(--accent3);font-weight:500">${h.provTB.toFixed(2)}</span>`
      : `<span style="color:var(--text-dim)">—</span>`;
    const protoStr = h.protocol === 'iSCSI'
      ? `<span style="color:var(--accent2);font-size:10px;letter-spacing:1px">iSCSI</span>`
      : `<span style="color:var(--accent);font-size:10px;letter-spacing:1px">FC</span>`;
    const hgStr = h.hostGroup
      ? `<span style="color:var(--text);font-size:11px">${h.hostGroup}</span>`
      : `<span style="color:var(--text-dim)">—</span>`;
    return `
    <tr>
      <td>${h.location}</td>
      <td>${h.cabinet}</td>
      <td style="color:var(--text-bright)">${h.host}</td>
      <td><span class="tag-os ${osTagClass(h.os)}">${h.os}</span></td>
      <td>${hgStr}</td>
      <td style="text-align:center">${protoStr}</td>
      <td class="sp-right">${provStr}</td>
      <td class="${cellClass}" ${title} ${wwnDataAttr}>${formatWwnCell(h.wwns)}</td>
    </tr>`;
  }).join('');

  window._renderedHostData = data;

  // Mapped host sayisi ve toplam provisioned
  const mappedHosts = data.filter(h => h.map === 'Mapped');
  const totalProv   = mappedHosts.reduce((s, h) => s + (h.provTB || 0), 0);
  const summaryHtml = mappedHosts.length > 0
    ? `<span style="font-size:11px;color:var(--text-dim);margin-right:12px">
        ${mappedHosts.length} Mapped host &nbsp;·&nbsp;
        Toplam: <strong style="color:var(--accent3)">${totalProv.toFixed(2)} TB</strong>
       </span>
       <button id="btn-export-mapped" style="background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;">
         &#8615; Mapped Export
       </button>`
    : '';

  document.getElementById('host-table-wrap').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:flex-end;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);">
      ${summaryHtml}
    </div>
    <table>
      <thead><tr>
        <th data-sort="location">Lokasyon</th>
        <th data-sort="cabinet">Kabinet</th>
        <th data-sort="host">Host Name</th>
        <th>OS</th>
        <th>Host Group</th>
        <th style="text-align:center">Protokol</th>
        <th class="sp-right">Provisioned (TB)</th>
        <th>Host WWN / IQN</th>
      </tr></thead>
      <tbody>${tbody || '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:20px">Veri yok</td></tr>'}</tbody>
    </table>`;
}

function formatWwnCell(wwns) {
  if (!wwns || wwns.length === 0) return '<span class="sp-dim-sm">—</span>';
  const first = wwns[0];
  const short = first.length >= 16 ? first.substring(0, 6) + '…' + first.substring(first.length - 4) : first;
  const extra = wwns.length > 1 ? `<span class="wwn-extra">+${wwns.length - 1}</span>` : '';
  return `<span style="font-family:monospace;font-size:10px;color:var(--accent2)">${short}</span>${extra}`;
}

/**
 * Mapped host'ları CSV olarak indir.
 * Mevcut filtreli tablodaki Mapped host'ları alır.
 * vendor: 'purefa' | 'pmax'
 */
function exportMappedHosts(vendor) {
  const data = (window._renderedHostData || []).filter(h => h.map === 'Mapped');
  if (data.length === 0) {
    alert('Görünümde Mapped host yok.');
    return;
  }

  const bom = '\uFEFF'; // Excel UTF-8 uyumluluğu
  const cols = vendor === 'pmax'
    ? ['Lokasyon','Array ID','Host Name','OS','Provisioned (TB)','Masking View','Storage Group','Host WWN']
    : ['Lokasyon','Kabinet','Host Name','OS','Provisioned (TB)','Host WWN'];
  
  const rows = data.map(h => {
    const wwns = (h.wwns || []).join(' | ');
    if (vendor === 'pmax') {
      return [h.location, h.cabinet, h.host, h.os,
              h.provTB ? h.provTB.toFixed(2) : '0',
              h.maskingView || '', h.storageGroup || '', wwns]
        .map(v => `"${String(v).replace(/"/g,'""')}"`)
        .join(',');
    }
    return [h.location, h.cabinet, h.host, h.os,
            h.provTB ? h.provTB.toFixed(2) : '0', wwns]
      .map(v => `"${String(v).replace(/"/g,'""')}"`)
      .join(',');
  });

  const today = new Date().toISOString().split('T')[0];
  const cab   = document.getElementById('host-cabinet').value || 'tum';
  const fname = `${vendor}_mapped_hosts_${cab}_${today}.csv`;
  const csv   = bom + cols.join(',') + '\r\n' + rows.join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function closeWwnModal() {
  document.getElementById('wwnModal').classList.remove('show');

function setWwnFormat(fmt) {
  currentWwnFormat = fmt;
  document.getElementById('fmtColon').classList.toggle('active', fmt === 'colon');
  document.getElementById('fmtPlain').classList.toggle('active', fmt === 'plain');
  renderWwnList();
}

function formatWwn(raw, fmt) {
  if (raw.startsWith('iqn:')) return raw.substring(4);  // iSCSI IQN olarak goster
  const clean = raw.replace(/[:-]/g, '').toLowerCase();
  if (fmt === 'plain') return clean;
  // colon format: aa:bb:cc:dd:ee:ff:gg:hh
  return clean.match(/.{1,2}/g).join(':');
}

function renderWwnList() {
  const list = document.getElementById('wwnList');
  list.innerHTML = currentWwns.map((w, i) => {
    const formatted = formatWwn(w, currentWwnFormat);
    return `
      <div class="wwn-row">
        <span class="wwn-index">${i + 1}.</span>
        <span class="wwn-value">${formatted}</span>
        <button class="wwn-copy-btn" data-wwn-copy-idx="${i}">Kopyala</button>
      </div>`;
  }).join('');
}

function copyOne(btn, idx) {
  const text = formatWwn(currentWwns[idx], currentWwnFormat);
  copyToClipboard(text).then(() => {
    btn.textContent = 'Kopyalandi';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAllWwns() {
  const text = currentWwns.map(w => formatWwn(w, currentWwnFormat)).join('\n');
  copyToClipboard(text).then(() => {
    // Tüm row'ların kopya butonlarını flash et
    document.querySelectorAll('.wwn-copy-btn').forEach(b => {
      b.textContent = 'Kopyalandi'; b.classList.add('copied');
      setTimeout(() => { b.textContent = 'Kopyala'; b.classList.remove('copied'); }, 1500);
    });
  });
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback: textarea hack
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    resolve();
  });
}

    if (e.target.closest('#fa-chip-clear')) clearHostFilters();
  });
})();

</script>
