<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerMax Storage Dashboard</title>
<link rel="stylesheet" href="./storage-styles.css">
<script src="./storage-utils.js"></script>
<script src="./nav.js"></script>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(30,45,68,.3) 1px,transparent 1px), linear-gradient(90deg,rgba(30,45,68,.3) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  /* LOADING */
  #loading-overlay {
    position:fixed; inset:0; background:rgba(8,12,20,.96); z-index:999;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
  }
  .spinner { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* SHELL */
  .shell { position:relative; z-index:1; max-width:1600px; margin:0 auto; padding:24px; }

  /* HEADER */
  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand-icon { width:42px; height:42px; border:2px solid var(--accent); display:grid; place-items:center; animation:pulse-border 3s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100%{ box-shadow:0 0 0 0 rgba(232,184,75,.4); } 50%{ box-shadow:0 0 0 6px rgba(232,184,75,0); } }
  .brand-icon svg { width:22px; height:22px; stroke:var(--accent); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .brand-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text-bright); letter-spacing:-.5px; }
  .brand-sub { font-size:10px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
  .header-meta { text-align:right; font-size:11px; color:var(--text-dim); line-height:1.8; }
  .live-dot { display:inline-block; width:6px; height:6px; background:var(--accent3); border-radius:50%; margin-right:6px; animation:blink 2s ease-in-out infinite; vertical-align:middle; }
/* TABS */
  .tabs { display:flex; gap:2px; margin-bottom:24px; border-bottom:1px solid var(--border); }
  .tab-btn { background:none; border:none; color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:10px 20px; cursor:pointer; position:relative; transition:color .2s; }
  .tab-btn::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transition:transform .2s; }
  .tab-btn.active { color:var(--accent); }
  .tab-btn.active::after { transform:scaleX(1); }
  .tab-btn:hover { color:var(--text); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* SUMMARY */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); padding:20px; position:relative; overflow:hidden; transition:border-color .2s,transform .2s; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
  .stat-card.gold::before { background:var(--accent); }
  .stat-card.blue::before { background:var(--accent2); }
  .stat-card.green::before { background:var(--accent3); }
  .stat-card.red::before { background:var(--danger); }
  .stat-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .stat-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; }
  .stat-value { font-family:'Syne',sans-serif; font-size:28px; font-weight:700; color:var(--text-bright); line-height:1; }
  .stat-unit { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); margin-left:4px; }
  .stat-sub { font-size:11px; color:var(--text-dim); margin-top:6px; }

  /* LOCATION */
  .location-block { margin-bottom:36px; }
  .location-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .location-tag { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); padding:4px 12px; border:1px solid var(--accent); }
  .location-line { flex:1; height:1px; background:linear-gradient(90deg,var(--accent) 0%,transparent 100%); opacity:.3; }

  /* CABINET CARDS */
  .cabinet-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
  .cabinet-card { background:var(--surface); border:1px solid var(--border); position:relative; overflow:hidden; transition:border-color .25s,box-shadow .25s; animation:fadeInUp .4s ease both; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .cabinet-card:hover { border-color:rgba(75,159,232,.5); box-shadow:0 0 30px rgba(75,159,232,.07); }
  .cabinet-card.error { border-color:rgba(232,75,75,.4); }
  .cabinet-card.warn-high { border-color:rgba(232,132,75,.4); }
  .card-header { display:flex; justify-content:space-between; align-items:flex-start; padding:16px 18px 12px; border-bottom:1px solid var(--border); background:var(--surface2); }
  .card-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--text-bright); }
  .card-ip { font-size:11px; color:var(--text-dim); margin-top:3px; }
  .status-badge { font-size:10px; padding:3px 8px; border-radius:2px; letter-spacing:1px; text-transform:uppercase; font-weight:500; }
  .badge-ok  { background:rgba(75,232,160,.15); color:var(--accent3); border:1px solid rgba(75,232,160,.3); }
  .badge-warn{ background:rgba(232,132,75,.15); color:var(--warn);    border:1px solid rgba(232,132,75,.3); }
  .badge-err { background:rgba(232,75,75,.15);  color:var(--danger);  border:1px solid rgba(232,75,75,.3); }
  .card-body { padding:16px 18px; }
  .cap-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .cap-label { font-size:10px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
  .cap-pct { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; }
  .bar-track { height:6px; background:var(--grid); border:1px solid var(--border); margin-bottom:14px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; position:absolute; left:0; top:0; }
  .bar-low { background:var(--accent3); } .bar-mid { background:var(--accent); }
  .bar-high { background:var(--warn); }   .bar-crit { background:var(--danger); }
  .metrics-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
  .metric { background:var(--grid); border:1px solid var(--border); padding:8px; text-align:center; }
  .metric-val { font-size:13px; font-weight:500; color:var(--text-bright); }
  .metric-lbl { font-size:9px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
  .os-section { margin-bottom:12px; }
  .os-title { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; }
  .os-bars { display:flex; gap:4px; align-items:flex-end; height:32px; }
  .os-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; }
  .os-bar { width:100%; min-height:3px; border-radius:1px; }
  .os-vmware { background:#4b9fe8; } .os-linux { background:#4be8a0; }
  .os-aix    { background:#e8b84b; } .os-windows{ background:#e87a4b; }
  .os-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
  .os-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text-dim); }
  .os-dot { width:8px; height:8px; border-radius:1px; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; padding:10px 18px; border-top:1px solid var(--border); background:var(--surface2); font-size:11px; }
  .footer-dr { color:var(--accent); } .footer-ver { color:var(--text-dim); }
  .error-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; height:140px; gap:10px; color:var(--danger); font-size:12px; letter-spacing:1px; }

  /* TABLES */
  .section-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .filter-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-select { background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:8px 12px; outline:none; transition:border-color .2s; }
  .filter-select:focus { border-color:var(--accent2); }
  .filter-select option { background:var(--surface2); }
  
  /* Aktif filtre chip alani */
  .active-filter-chips {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    background:rgba(232,184,75,.08);
    border:1px solid rgba(232,184,75,.25);
    border-left:3px solid var(--accent);
    padding:10px 14px; margin-bottom:14px;
  }
  .filter-chip {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-dim); font-size:10px;
    padding:3px 10px; letter-spacing:.5px;
  }
  .filter-chip strong { color:var(--accent); margin-left:4px; }
  .filter-chip-clear {
    background:transparent; border:1px solid var(--text-dim);
    color:var(--text-dim); font-family:'JetBrains Mono',monospace;
    font-size:10px; padding:3px 10px; cursor:pointer;
    letter-spacing:1px; text-transform:uppercase;
    margin-left:auto; transition:all .2s;
  }
  .filter-chip-clear:hover { color:var(--danger); border-color:var(--danger); }
  
  .stat-card-click { cursor:pointer; }
  .stat-card-click:hover { border-color:var(--accent2); }
  .cabinet-card-click { cursor:pointer; }
  .os-legend-clickable { cursor:pointer; transition:background .15s; }
  .os-legend-clickable:hover { background:rgba(75,159,232,.1); border-radius:3px; }
  .search-box { position:relative; flex:1; max-width:280px; }
  .search-box input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:8px 12px 8px 32px; outline:none; transition:border-color .2s; }
  .search-box input:focus { border-color:var(--accent2); }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th { background:var(--surface2); border:1px solid var(--border); padding:10px 14px; text-align:left; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); white-space:nowrap; cursor:pointer; user-select:none; transition:color .2s; }
  thead th:hover { color:var(--accent); }
  tbody tr { border:1px solid var(--border); transition:background .15s; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:9px 14px; border-bottom:1px solid rgba(30,45,68,.6); color:var(--text); }
  .tag-os { display:inline-block; padding:2px 7px; font-size:10px; border-radius:2px; font-weight:500; }
  .tag-vmware  { background:rgba(75,159,232,.2); color:#4b9fe8; }
  .tag-linux   { background:rgba(75,232,160,.2); color:#4be8a0; }
  .tag-aix     { background:rgba(232,184,75,.2); color:#e8b84b; }
  .tag-windows { background:rgba(232,122,75,.2); color:#e87a4b; }
  .tag-unknown { background:rgba(90,112,144,.2); color:var(--text-dim); }

  /* WWN cell - tiklanabilir */
  .wwn-cell-clickable { cursor:pointer; transition:opacity .15s; }
  .wwn-cell-clickable:hover { opacity:.7; }
  .wwn-cell-clickable .wwn-extra {
    background:rgba(75,159,232,.12); border:1px solid rgba(75,159,232,.3);
    color:var(--accent2); padding:1px 6px; border-radius:2px;
    font-size:9px; margin-left:4px;
  }

  /* MODAL */
  .modal-backdrop {
    position:fixed; inset:0; background:rgba(8,12,20,.85); z-index:1000;
    display:none; align-items:center; justify-content:center;
    animation:fadeIn .2s ease;
  }
  .modal-backdrop.show { display:flex; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-card {
    background:var(--surface); border:1px solid var(--border);
    border-left:3px solid var(--accent);
    width:90%; max-width:560px; max-height:80vh;
    display:flex; flex-direction:column;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface2);
  }
  .modal-title {
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    color:var(--text-bright); letter-spacing:.5px;
  }
  .modal-host { font-size:11px; color:var(--text-dim); margin-top:3px; letter-spacing:.5px; }
  .modal-close {
    background:transparent; border:none; color:var(--text-dim);
    font-size:20px; cursor:pointer; padding:0 6px; transition:color .2s;
  }
  .modal-close:hover { color:var(--danger); }
  .modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
  .wwn-row {
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; background:var(--grid); border:1px solid var(--border);
    margin-bottom:8px; font-family:'JetBrains Mono',monospace;
  }
  .wwn-row:hover { border-color:var(--accent2); }
  .wwn-index { font-size:10px; color:var(--text-dim); min-width:18px; }
  .wwn-value {
    flex:1; font-size:12px; color:var(--accent3);
    word-break:break-all; letter-spacing:.5px; user-select:all;
  }
  .wwn-copy-btn {
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:9px;
    padding:4px 10px; cursor:pointer; letter-spacing:1px;
    text-transform:uppercase; transition:all .2s; white-space:nowrap;
  }
  .wwn-copy-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .wwn-copy-btn.copied { border-color:var(--accent3); color:var(--accent3); }
  .modal-actions {
    padding:12px 20px; border-top:1px solid var(--border);
    background:var(--surface2); display:flex; gap:8px; justify-content:flex-end;
  }
  .modal-btn {
    background:transparent; border:1px solid var(--border); color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:11px;
    padding:7px 14px; cursor:pointer; letter-spacing:1px;
    text-transform:uppercase; transition:all .2s;
  }
  .modal-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .modal-btn.primary { border-color:var(--accent); color:var(--accent); }
  .modal-btn.primary:hover { background:var(--accent); color:var(--bg); }
  .wwn-format-toggle {
    display:flex; gap:0; margin-bottom:12px; border:1px solid var(--border);
  }
  .wwn-format-btn {
    flex:1; background:transparent; border:none; color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:10px;
    padding:6px 10px; cursor:pointer; letter-spacing:1px;
    text-transform:uppercase; transition:all .15s;
  }
  .wwn-format-btn.active { background:var(--surface2); color:var(--accent2); }
  .wwn-format-btn:hover:not(.active) { color:var(--text); }

  /* FOOTER */
  .dash-footer { margin-top:40px; padding-top:16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); letter-spacing:1px; }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent2); }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">CSV Dosyalari Yukleniyor</div>
</div>

<div class="shell">

  <a href="./index.html" class="back-link">&larr; Portala Don</a>

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="brand-title">Storage Intelligence</div>
        <div class="brand-sub">Dell EMC PowerMax / VMAX Fleet</div>
      </div>
    </div>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE MONITORING</div>
      <div id="clock"></div>
      <div id="data-fresh-badge" data-fresh-badge style="margin-top:2px"></div>
      <div id="header-summary">-</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="hosts">Host Listesi</button>
    <button class="tab-btn" data-tab="luns">Storage Groups</button>
    <button class="tab-btn" data-tab="snapshots">Snapshot Policy</button>
  </div>

  <div class="tab-panel active" id="tab-overview">
    <div class="summary-grid" id="global-summary"></div>
    <div id="location-blocks"></div>
  </div>

  <div class="tab-panel" id="tab-hosts">
    <div class="section-title">Host Envanteri</div>
    <!-- Aktif filtre chip alani (alarm tiklamasi ile aktif olur) -->
    <div class="active-filter-chips" id="hostFilterChips" class="sp-hidden"></div>
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Host ara..." id="host-search">
      </div>
      <select class="filter-select" id="host-location"><option value="">Tum Lokasyonlar</option></select>
      <select class="filter-select" id="host-cabinet"><option value="">Tum Array'ler</option></select>
      <select class="filter-select" id="host-os">
        <option value="">Tum OS</option>
        <option>Linux</option><option>Windows</option><option>VMware ESX</option><option>AIX</option><option>Unknown</option>
      </select>
    </div>
    <div id="host-table-wrap"></div>
  </div>

  <div class="tab-panel" id="tab-luns">
    <div class="section-title">Storage Group / LUN Envanteri</div>
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Storage Group ara..." id="lun-search">
      </div>
      <select class="filter-select" id="lun-location"><option value="">Tum Lokasyonlar</option></select>
      <select class="filter-select" id="lun-cabinet"><option value="">Tum Array'ler</option></select>
    </div>
    <div id="lun-table-wrap"></div>
  </div>


  <div class="tab-panel" id="tab-snapshots">
    <div class="section-title">Snapshot Policy Listesi</div>
    <div id="pmax-snap-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px"></div>
    <div class="filter-row">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" placeholder="Policy adı, Storage Group ara..." id="pmax-snap-search">
      </div>
      <select class="filter-select" id="pmax-snap-cab"><option value="">Tüm Diziler</option></select>
      <select class="filter-select" id="pmax-snap-status">
        <option value="">Tüm Durumlar</option>
        <option value="Aktif">Aktif</option>
        <option value="Pasif">Pasif</option>
      </select>
    </div>
    <div id="pmax-snap-table-wrap"></div>
  </div>

  <div class="dash-footer">
    <span>DELL EMC POWERMAX / VMAX FLEET DASHBOARD</span>
    <span>POWERSHELL AUTOMATION v2.0</span>
  </div>
</div>

<!-- WWN MODAL -->
<div class="modal-backdrop" id="wwnModal" id="wwnModal">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <div class="modal-title">Host WWN'ler</div>
        <div class="modal-host" id="modalHostName">-</div>
      </div>
      <button class="modal-close" id="wwnModalClose" title="Kapat">&times;</button>
    </div>
    <div class="modal-body">
      <div class="wwn-format-toggle">
        <button class="wwn-format-btn active" id="fmtColon">aa:aa:aa:aa</button>
        <button class="wwn-format-btn" id="fmtPlain">aaaaaaaa</button>
      </div>
      <div id="wwnList"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="wwnCopyAll">Hepsini Kopyala</button>
      <button class="modal-btn primary" id="wwnClosePrimary">Kapat</button>
    </div>
  </div>
</div>

<script>
let cabinets  = [];
let hosts     = [];
let lunGroups = [];

const CSV_DASHBOARD = './Pmax/PmaxPoolDash.csv';
const CSV_HOSTS     = './Pmax/PmaxPoolHost.csv';

/* Lokasyon adi normalize (ISTANBUL -> Istanbul) */
function normalizeLoc(s) {
  if (!s) return '';
  const t = s.trim();
  if (t === '---' || t === '===') return t;
  return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
}

function parseDashboard(text) {
  const skip = ['---', '==='];
  return parseCSV(text)
    .filter(r => {
      const k = (r['Kabinet'] || '').trim();
      const l = (r['Lokasyon'] || '').trim();
      if (!k) return false;
      if (skip.includes(l)) return false;
      if (/^TOPLAM|^GENEL/i.test(k)) return false;
      return true;
    })
    .map(r => {
      const ip  = (r['IP'] || '').trim();
      const tot = (r['Total (TB)'] || '').trim();
      const isErr = tot === '' || tot === '-' || tot.toUpperCase() === 'HATA';

      if (isErr) return {
        location: normalizeLoc(r['Lokasyon']),
        name:     r['Kabinet'],
        ip,
        error:    true,
      };

      // OS Dagilimi parse: "AIX: 4 | Linux: 1"
      const osObj = {};
      (r['OS Dagilimi'] || '').split('|').forEach(p => {
        const m = p.trim().match(/^(.+?):\s*(\d+)$/);
        if (m) osObj[m[1].trim()] = parseInt(m[2]);
      });

      return {
        location:   normalizeLoc(r['Lokasyon']),
        name:       r['Kabinet'],
        ip,
        total:      toN(r['Total (TB)']),
        used:       toN(r['Used (TB)']),
        subscribed: toN(r['Subscribed (TB)']),
        free:       toN(r['Free (TB)']),
        pct:        toN(r['Doluluk (%)']),
        dr:         (r['Data Reduction'] || '-').trim(),
        hostCount:  parseInt(r['Host Sayisi']) || 0,
        os:         osObj,
        version:    (r['Versiyon'] || '').trim(),
      };
    });
}

function parseHosts(text) {
  // Host başına kapasite topla (bir host birden fazla masking view'da olabilir)
  const capMap  = {};   // "arrayId::hostName" -> toplam TB
  const seenAll = {};   // ilk gorulen satirı sakla
  
  parseCSV(text).forEach(r => {
    const h   = (r['Host Name'] || '').trim();
    const arr = (r['Array ID']  || '').trim();
    if (!h) return;
    const key = `${arr}::${h.toLowerCase()}`;
    const cap = parseFloat(r['Provisioned (TB)'] || '0') || 0;
    capMap[key] = (capMap[key] || 0) + cap;
    if (!seenAll[key]) seenAll[key] = r;
  });

  return Object.entries(seenAll).map(([key, r]) => ({
    location:     normalizeLoc(r['Lokasyon']),
    cabinet:      (r['Array ID'] || '').trim(),
    host:         (r['Host Name'] || '').trim(),
    os:           (r['OS'] || 'Unknown').trim() || 'Unknown',
    maskingView:  (r['Masking View'] || '').trim(),
    storageGroup: (r['Storage Group'] || '').trim(),
    provTB:       Math.round((capMap[key] || 0) * 100) / 100,
    wwns:         (r['Host WWN'] || '').split('|').map(s => s.trim()).filter(s => s),
  }));
}

function parseLunGroups(text) {
  return parseCSV(text)
    .filter(r => (r['Lun Group Name'] || '').trim() !== '')
    .map(r => ({
      location: normalizeLoc(r['Lokasyon']),
      cabinet:  (r['Kabinet'] || '').trim(),
      name:     (r['Lun Group Name'] || '').trim(),
      capacity: toN(r['Total Capacity (TB)']),
      lunCount: parseInt(r['LUN Count']) || 0,
    }));
}

async function loadCSVs() {
  setOverlay(true, '<div class="spinner"></div><div class="loading-text">CSV Dosyalari Yukleniyor</div>');
  try {
    const fetchCSV = fetchCSVText;
    const [dashText, hostText, lunText] = await Promise.all([
      fetchCSV(CSV_DASHBOARD),
      fetchCSV(CSV_HOSTS),
      fetchCSV(CSV_LUNGROUPS),
    ]);
    cabinets  = parseDashboard(dashText);
    hosts     = parseHosts(hostText);
    lunGroups = parseLunGroups(lunText);
    setOverlay(false);
    initDashboard();
  } catch (err) {
    setOverlay(true, `
      <div style="text-align:center;max-width:500px;padding:32px">
        <div style="font-size:36px;color:var(--danger);margin-bottom:16px">!</div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;color:var(--text-bright);margin-bottom:12px">CSV Yuklenemedi</div>
        <div style="font-size:12px;color:var(--danger);padding:8px 14px;background:rgba(232,75,75,.1);border:1px solid rgba(232,75,75,.3);margin-bottom:20px">${err.message}</div>
        <button id="btn-retry-load" style="margin-top:24px;background:var(--accent);color:#000;border:none;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;padding:10px 24px;cursor:pointer">YENIDEN DENE</button>
      </div>`);
  }
}

  const el = document.getElementById('loading-overlay');
  el.style.display = show ? 'flex' : 'none';

}

function barClass(p)    { return spBarClass(p); }
function pctColor(p)    { return spPctColor(p); }
function statusBadge(p) { return spStatusBadge(p); }
function osTagClass(os) {
  const map = { 'Linux':'linux','Windows':'windows','VMware ESX':'vmware','AIX':'aix' };
  return 'tag-' + (map[os] || 'unknown');
}
function fmt(n) { return typeof n==='number' ? n.toFixed(2) : n; }

function buildSummary() {
  const v = cabinets.filter(c => !c.error);
  const totCap  = v.reduce((s,c)=>s+c.total, 0);
  const totUsed = v.reduce((s,c)=>s+c.used,  0);
  const totFree = v.reduce((s,c)=>s+c.free,  0);
  const totHost = v.reduce((s,c)=>s+c.hostCount, 0);
  const avgPct  = totCap>0 ? (totUsed/totCap*100).toFixed(1) : '0';
  const crit = v.filter(c=>c.pct>=65).length;
  const warn = v.filter(c=>c.pct>=50&&c.pct<65).length;
  const locs = [...new Set(cabinets.map(c=>c.location))].length;

  document.getElementById('global-summary').innerHTML = `
    <div class="stat-card gold">
      <div class="stat-label">Toplam Kapasite</div>
      <div class="stat-value">${(totCap/1024).toFixed(2)}<span class="stat-unit">PB</span></div>
      <div class="stat-sub">${totCap.toFixed(0)} TB</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Kullanilan</div>
      <div class="stat-value">${(totUsed/1024).toFixed(2)}<span class="stat-unit">PB</span></div>
      <div class="stat-sub">Ort. %${avgPct}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Bos Alan</div>
      <div class="stat-value">${(totFree/1024).toFixed(2)}<span class="stat-unit">PB</span></div>
      <div class="stat-sub">${totFree.toFixed(0)} TB</div>
    </div>
    <div class="stat-card ${crit>0?'red':'gold'}">
      <div class="stat-label">Alarm Durumu</div>
      <div class="stat-value">${crit}<span class="stat-unit">kritik</span></div>
      <div class="stat-sub">${warn} uyari</div>
    </div>
    <div class="stat-card blue stat-card-click" data-host-filter='{"label":"Tum Hostlar"}'>
      <div class="stat-label">Toplam Host</div>
      <div class="stat-value">${totHost}</div>
      <div class="stat-sub">${locs} lokasyon &middot; tikla &rarr;</div>
    </div>`;
}

function cabinetCard(c) {
  if (c.error) return `
    <div class="cabinet-card error">
      <div class="card-header">
        <div><div class="card-name">${c.name}</div><div class="card-ip">${c.location}${c.ip?' · '+c.ip:''}</div></div>
        <span class="status-badge badge-err">ERROR</span>
      </div>
      <div class="error-overlay">! Baglanti / Veri Hatasi</div>
    </div>`;

  const osKeys = Object.keys(c.os);
  const totOS  = osKeys.reduce((s,k)=>s+c.os[k], 0);
  const osBars = osKeys.map(k => `<div class="os-bar-wrap"><div class="os-bar ${osBarMap[k]||'os-linux'}" style="height:${totOS>0?c.os[k]/totOS*100:0}%"></div></div>`).join('');
  // OS legend tiklanabilir: o array + o OS filtresi
  const osLegend = osKeys.map(k => {
    const safeK = k.replace(/'/g, "\\'");
    return `<div class="os-legend-item os-legend-clickable" data-host-filter='{"label":"${c.name} - ${k}","cabinet":"${c.name}","os":"${safeK}"}'><div class="os-dot" style="background:${dotColors[(osBarMap[k]||'os-linux').replace('os-','')]}"></div><span>${k}: ${c.os[k]}</span></div>`;
  }).join('');

  return `
    <div class="${spCabinetClass(c.pct)} cabinet-card-click" data-host-filter='{"label":"${c.name} - ${c.name}","cabinet":"${c.name}"}'>
      <div class="card-header">
        <div>
          <div class="card-name">${c.name}</div>
          <div class="card-ip">${c.location}${c.ip?' · '+c.ip:''}</div>
        </div>
        ${statusBadge(c.pct)}
      </div>
      <div class="card-body">
        <div class="cap-row">
          <span class="cap-label">Doluluk</span>
          <span class="cap-pct" style="color:${pctColor(c.pct)}">%${c.pct}</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${barClass(c.pct)}" style="width:${c.pct}%"></div></div>
        <div class="metrics-row">
          <div class="metric"><div class="metric-val">${fmt(c.total)}</div><div class="metric-lbl">Total</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.used)}</div><div class="metric-lbl">Used</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.subscribed)}</div><div class="metric-lbl">Sub</div></div>
          <div class="metric"><div class="metric-val">${fmt(c.free)}</div><div class="metric-lbl">Free</div></div>
        </div>
        <div class="os-section">
          <div class="os-title">OS Dagilimi · ${totOS} Host</div>
          <div class="os-bars">${osBars||'<div style="flex:1;background:var(--grid)"></div>'}</div>
          <div class="os-legend">${osLegend||'<div class="os-legend-item" style="color:var(--text-dim)">veri yok</div>'}</div>
        </div>
      </div>
      ${spCabinetFooter({ dr: c.dr, ver: normalizeVersion(c.version) })}
    </div>`;
}

function buildOverview() {
  const locs = [...new Set(cabinets.map(c=>c.location))].sort();
  document.getElementById('location-blocks').innerHTML = locs.map(loc => {
    const lc = cabinets.filter(c=>c.location===loc);
    return `
      <div class="location-block">
        <div class="location-header"><div class="location-tag">${loc}</div><div class="location-line"></div></div>
        <div class="cabinet-grid">${lc.map(c=>cabinetCard(c)).join('')}</div>
      </div>`;
  }).join('');
}

function populateFilters() {
  function fill(id, values) {
    const sel = document.getElementById(id);
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first;
    [...new Set(values)].filter(v => v).sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }
  fill('host-location', hosts.map(h=>h.location));
  fill('host-cabinet',  hosts.map(h=>h.cabinet));
  fill('lun-location',  lunGroups.map(l=>l.location));
  fill('lun-cabinet',   lunGroups.map(l=>l.cabinet));
}

let hostSort = { col:'host', dir:'asc' };
function renderHostTable() {
  const search = document.getElementById('host-search').value.toLowerCase();
  const loc = document.getElementById('host-location').value;
  const cab = document.getElementById('host-cabinet').value;
  const os  = document.getElementById('host-os').value;

  let data = hosts.filter(h =>
    (!search || h.host.toLowerCase().includes(search)) &&
    (!loc || h.location===loc) &&
    (!cab || h.cabinet===cab) &&
    (!os || h.os===os)
  );
  data.sort((a,b) => (hostSort.dir==='asc'?1:-1)*((a[hostSort.col]??'') < (b[hostSort.col]??'') ? -1 : 1));

  const tbody = data.map((h, idx) => {
    const hasWwns = h.wwns && h.wwns.length > 0;
    const cellClass = hasWwns ? 'wwn-cell-clickable' : '';
    const wwnDataAttr = hasWwns ? `data-wwn-idx="${idx}"` : '';
    const title = hasWwns ? 'title="Tikla ve kopyala"' : '';
    const provStr = h.provTB > 0
      ? `<span style="color:var(--accent3);font-weight:500">${h.provTB.toFixed(2)}</span>`
      : `<span style="color:var(--text-dim)">—</span>`;
    return `
    <tr>
      <td>${h.location}</td>
      <td>${h.cabinet}</td>
      <td style="color:var(--text-bright)">${h.host}</td>
      <td><span class="tag-os ${osTagClass(h.os)}">${h.os}</span></td>
      <td class="sp-right">${provStr}</td>
      <td style="font-size:11px;color:var(--text-dim)">${h.maskingView}</td>
      <td class="${cellClass}" ${title} ${wwnDataAttr}>${formatWwnCell(h.wwns)}</td>
    </tr>`;
  }).join('');

  window._renderedHostData = data;

  // Özet + export satırı
  const totalProv = data.reduce((s, h) => s + (h.provTB || 0), 0);
  const summaryHtml = `
    <span style="font-size:11px;color:var(--text-dim);margin-right:12px">
      ${data.length} host &nbsp;·&nbsp;
      Toplam: <strong style="color:var(--accent3)">${totalProv.toFixed(2)} TB</strong>
    </span>
    <button id="btn-export-mapped" style="background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;">
      &#8615; Export
    </button>`;

  document.getElementById('host-table-wrap').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:flex-end;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);">
      ${summaryHtml}
    </div>
    <table>
      <thead><tr>
        <th data-sort="location">Lokasyon</th>
        <th data-sort="cabinet">Array ID</th>
        <th data-sort="host">Host Name</th>
        <th>OS</th>
        <th class="sp-right">Provisioned (TB)</th>
        <th>Masking View</th>
        <th>Host WWN</th>
      </tr></thead>
      <tbody>${tbody || '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:20px">Veri yok</td></tr>'}</tbody>
    </table>`;
}

function formatWwnCell(wwns) {
  if (!wwns || wwns.length === 0) return '<span class="sp-dim-sm">—</span>';
  const first = wwns[0];
  const short = first.length >= 16 ? first.substring(0, 6) + '…' + first.substring(first.length - 4) : first;
  const extra = wwns.length > 1 ? `<span class="wwn-extra">+${wwns.length - 1}</span>` : '';
  return `<span style="font-family:monospace;font-size:10px;color:var(--accent2)">${short}</span>${extra}`;
}

function exportMappedHosts(vendor) {
  const data = (window._renderedHostData || []);
  if (data.length === 0) { alert('Görünümde host yok.'); return; }

  const bom  = '\uFEFF';
  const cols = vendor === 'pmax'
    ? ['Lokasyon','Array ID','Host Name','OS','Provisioned (TB)','Masking View','Host WWN']
    : ['Lokasyon','Kabinet','Host Name','OS','Provisioned (TB)','Host WWN'];

  const rows = data.map(h => {
    const wwns = (h.wwns || []).join(' | ');
    const vals = vendor === 'pmax'
      ? [h.location, h.cabinet, h.host, h.os,
         h.provTB ? h.provTB.toFixed(2) : '0',
         h.maskingView || '', wwns]
      : [h.location, h.cabinet, h.host, h.os,
         h.provTB ? h.provTB.toFixed(2) : '0', wwns];
    return vals.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });

  const today = new Date().toISOString().split('T')[0];
  const cab   = document.getElementById('host-cabinet') ? document.getElementById('host-cabinet').value || 'tum' : 'tum';
  const csv   = bom + cols.join(',') + '\r\n' + rows.join('\r\n');
  const blob  = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = `${vendor}_hosts_${cab}_${today}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

let currentWwns = [];
let currentWwnFormat = 'colon';

function openWwnModalByIdx(idx) {
  const h = window._renderedHostData && window._renderedHostData[idx];
  if (!h || !h.wwns || h.wwns.length === 0) return;
  openWwnModal(h.host, h.cabinet, h.wwns);
}

function openWwnModal(hostName, cabinet, wwns) {
  if (!wwns || wwns.length === 0) return;
  currentWwns = wwns;
  document.getElementById('modalHostName').textContent = `${cabinet} / ${hostName}  ·  ${wwns.length} WWN`;
  renderWwnList();
  document.getElementById('wwnModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeWwnModal() {
  document.getElementById('wwnModal').classList.remove('show');
  document.body.style.overflow = '';
}

function setWwnFormat(fmt) {
  currentWwnFormat = fmt;
  document.getElementById('fmtColon').classList.toggle('active', fmt === 'colon');
  document.getElementById('fmtPlain').classList.toggle('active', fmt === 'plain');
  renderWwnList();
}

function formatWwn(raw, fmt) {
  if (raw.startsWith('iqn:')) return raw.substring(4);
  const clean = raw.replace(/[:-]/g, '').toLowerCase();
  if (fmt === 'plain') return clean;
  return clean.match(/.{1,2}/g).join(':');
}

function renderWwnList() {
  const list = document.getElementById('wwnList');
  list.innerHTML = currentWwns.map((w, i) => {
    const formatted = formatWwn(w, currentWwnFormat);
    return `
      <div class="wwn-row">
        <span class="wwn-index">${i + 1}.</span>
        <span class="wwn-value">${formatted}</span>
        <button class="wwn-copy-btn" data-wwn-copy-idx="${i}">Kopyala</button>
      </div>`;
  }).join('');
}

function copyOne(btn, idx) {
  const text = formatWwn(currentWwns[idx], currentWwnFormat);
  copyToClipboard(text).then(() => {
    btn.textContent = 'Kopyalandi';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAllWwns() {
  const text = currentWwns.map(w => formatWwn(w, currentWwnFormat)).join('\n');
  copyToClipboard(text).then(() => {
    document.querySelectorAll('.wwn-copy-btn').forEach(b => {
      b.textContent = 'Kopyalandi'; b.classList.add('copied');
      setTimeout(() => { b.textContent = 'Kopyala'; b.classList.remove('copied'); }, 1500);
    });
  });
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    resolve();
  });
}

document.addEventListener('keydown', e => {

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'snapshots' && pmaxSnapData.length === 0) loadPmaxSnap().then(renderPmaxSnap);
  else if (name === 'snapshots') renderPmaxSnap();
}

/* ========================================================
   DRILL-DOWN: kabinet kart -> host listesi filter
   ======================================================== */
function applyHostFilter(opts) {
  document.getElementById('host-search').value   = opts.search   || '';
  document.getElementById('host-location').value = opts.location || '';
  document.getElementById('host-cabinet').value  = opts.cabinet  || '';
  document.getElementById('host-os').value       = opts.os       || '';
  
  renderHostFilterChips(opts);
  switchTab('hosts');
  renderHostTable();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function renderHostFilterChips(opts) {
  const box = document.getElementById('hostFilterChips');
  if (!box) return;
  const chips = [];
  if (opts.label)    chips.push({ key:'label', val:opts.label });
  if (opts.location) chips.push({ key:'Lokasyon', val:opts.location });
  if (opts.cabinet)  chips.push({ key:'Array',    val:opts.cabinet  });
  if (opts.os)       chips.push({ key:'OS',       val:opts.os       });
  
  if (chips.length === 0) {
    box.innerHTML = ''; box.style.display = 'none';
    return;
  }
  box.style.display = 'flex';
  box.innerHTML = chips.map(c =>
    `<span class="filter-chip">${c.key === 'label' ? `<strong>${c.val}</strong>` : `${c.key}: <strong>${c.val}</strong>`}</span>`
  ).join('') + `<button class="filter-chip-clear" id="pmax-chip-clear">Temizle</button>`;
}

function clearHostFilters() {
  document.getElementById('host-search').value   = '';
  document.getElementById('host-location').value = '';
  document.getElementById('host-cabinet').value  = '';
  document.getElementById('host-os').value       = '';
  renderHostFilterChips({});
  renderHostTable();
}

/* ═══════════════════════════════════════════════
   PMAX SNAPSHOT POLICY
═══════════════════════════════════════════════ */
const CSV_PMAX_SNAP = './Pmax/Pmax_SnapPolicy.csv';
let pmaxSnapData = [];

async function loadPmaxSnap() {
  const text = await (async () => {
    try { return await fetchCSVText(CSV_PMAX_SNAP); }
    catch { return ''; }
  })();
  pmaxSnapData = parseCSV(text).filter(r => (r['PolicyName']||'').trim() !== '').map(r => ({
    host: r['Host'] || '',
    kabinet: r['Kabinet'] || '',
    policy: r['PolicyName'] || '',
    schedule: r['Schedule'] || '-',
    retention: r['Retention'] || '-',
    status: r['Status'] || '',
    taken: parseInt(r['SnapshotsTaken'] || '0'),
    remaining: parseInt(r['SnapshotsRemaining'] || '0'),
    total: parseInt(r['TotalSnapshots'] || '0'),
  }));
}

function renderPmaxSnap() {
  const el = document.getElementById('pmax-snap-table-wrap');
  if (pmaxSnapData.length === 0) {
    document.getElementById('pmax-snap-summary').innerHTML = '';
    el.innerHTML = spEmptyState({type:'no-data',title:'Veri henüz hazır değil',message:'Dell EMC PowerMax taraması yapıldıktan sonra burada görünecek.',hint:'Storage_report.ps1 çalıştırıldıktan sonra Pmax/Pmax_SnapPolicy.csv oluşacak.'}); return;
  }
  const search = (document.getElementById('pmax-snap-search').value || '').toLowerCase();
  const cabF   =  document.getElementById('pmax-snap-cab').value    || '';
  const statF  =  document.getElementById('pmax-snap-status').value || '';

  const cabs = [...new Set(pmaxSnapData.map(r => r.kabinet).filter(Boolean))].sort();
  const cabSel = document.getElementById('pmax-snap-cab');
  const cur = cabSel.value;
  cabSel.innerHTML = '<option value="">Tüm Diziler</option>' + cabs.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if (cur) cabSel.value = cur;

  // status filter dropdown: populate from data
  const statSel = document.getElementById('pmax-snap-status');
  const statuses = [...new Set(pmaxSnapData.map(r => r.status).filter(Boolean))].sort();
  const curStat = statSel.value;
  statSel.innerHTML = '<option value="">Tüm Durumlar</option>' + statuses.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  if (curStat) statSel.value = curStat;

  let data = pmaxSnapData.filter(r =>
    (!search || r.policy.toLowerCase().includes(search) || r.host.toLowerCase().includes(search)) &&
    (!cabF   || r.kabinet === cabF) &&
    (!statF  || r.status === statF)
  );

  const aktif = data.filter(r => r.status === 'Active' || r.status === 'Aktif').length;
  const uniqPolicies = new Set(data.map(r => r.policy)).size;
  const uniqHosts    = new Set(data.map(r => r.host).filter(Boolean)).size;
  const totalTaken   = data.reduce((s,r) => s + (r.taken||0), 0);
  const totalRemain  = data.reduce((s,r) => s + (r.remaining||0), 0);
  const totalSnaps   = data.reduce((s,r) => s + (r.total||0), 0);

  document.getElementById('pmax-snap-summary').innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);padding:12px 16px">
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Toplam Policy</div>
      <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text-bright)">${uniqPolicies}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:4px">${uniqHosts} host üzerinde</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent3);padding:12px 16px">
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Aktif Atama</div>
      <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent3)">${aktif}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:4px">${data.length} toplam atama</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 16px">
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Alınan Snapshot</div>
      <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent)">${totalTaken}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:4px">${totalRemain} slot kaldı</div>
    </div>`;

  // mini capacity bar helper for snapshot slots
  function snapBar(taken, total) {
    if (!total || total === 0) return '<span style="color:var(--text-dim)">—</span>';
    const pct = Math.min(100, Math.round(taken / total * 100));
    const col = pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warn)' : 'var(--accent3)';
    return `<div style="display:flex;align-items:center;gap:6px;min-width:100px">
      <div style="flex:1;height:4px;background:var(--grid);border:1px solid var(--border);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col}"></div>
      </div>
      <span style="font-size:10px;color:${col};min-width:30px">%${pct}</span>
    </div>`;
  }

  const rows = data.map(r => {
    const isActive = r.status === 'Active' || r.status === 'Aktif';
    const remain = isNaN(r.remaining) ? '—' : r.remaining;
    const taken  = isNaN(r.taken)    ? '—' : r.taken;
    const total  = isNaN(r.total)    ? '—' : r.total;
    return `<tr>
      <td style="color:var(--text-dim);font-size:11px">${esc(r.kabinet)}</td>
      <td style="color:var(--text-bright);font-weight:500">${esc(r.host)}</td>
      <td style="color:var(--accent2)">${esc(r.policy)}</td>
      <td style="color:var(--accent);font-weight:500">${esc(r.schedule)}</td>
      <td style="color:var(--purple)">${esc(r.retention)}</td>
      <td style="text-align:center"><span style="color:var(--accent3);font-weight:600">${taken}</span></td>
      <td style="text-align:center"><span style="color:var(--text-dim)">${remain}</span></td>
      <td style="text-align:center"><span style="color:var(--text-bright)">${total}</span></td>
      <td>${snapBar(r.taken, r.total)}</td>
      <td><span style="color:${isActive?'var(--accent3)':'var(--text-dim)'};font-size:10px;padding:2px 8px;border:1px solid ${isActive?'rgba(75,232,160,.3)':'rgba(90,112,144,.3)'};background:${isActive?'rgba(75,232,160,.08)':'transparent'}">${esc(r.status)}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim)">${data.length} atama &nbsp;·&nbsp; ${uniqPolicies} farklı policy &nbsp;·&nbsp; ${uniqHosts} host</div>
    <div style="overflow-x:auto">
    <table><thead><tr>
      <th>Dizi</th>
      <th>Host</th>
      <th>Policy Adı</th>
      <th>Schedule</th>
      <th>Retention</th>
      <th style="text-align:center">Alınan Snap</th>
      <th style="text-align:center">Kalan Slot</th>
      <th style="text-align:center">Max Snap</th>
      <th>Doluluk</th>
      <th>Durum</th>
    </tr></thead><tbody>${rows||'<tr><td colspan="10" style="text-align:center;color:var(--text-dim);padding:20px">Veri yok</td></tr>'}</tbody></table>
    </div>`;
}

/* ════════════ EVENT DELEGATION — pmax.html ════════════ */
(function wireEvents() {
  const db = typeof debounce === 'function' ? debounce : (fn) => fn;

  // Tabs
  const tabBar = document.querySelector('.tabs');
  if (tabBar) tabBar.addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (btn) switchTab(btn.dataset.tab);
  });

  // Filter inputs
  const wire = (id, fn, ev='input') => { const el=document.getElementById(id); if(el) el.addEventListener(ev, fn); };
  wire('host-search',   db(renderHostTable), 'input');
  wire('host-location', renderHostTable, 'change');
  wire('host-cabinet',  renderHostTable, 'change');
  wire('host-os',       renderHostTable, 'change');
  wire('host-protocol', renderHostTable, 'change');
  wire('host-map',      renderHostTable, 'change');
  wire('lun-search',    db(renderLunTable), 'input');
  wire('lun-location',  renderLunTable, 'change');
  wire('lun-cabinet',   renderLunTable, 'change');
  wire('hd-search',     typeof renderHostDetail === 'function' ? db(renderHostDetail) : null, 'input');
  wire('pmax-snap-search', typeof __db_renderPmaxSnap === 'function' ? db(typeof renderPmaxSnap === 'function' ? renderPmaxSnap : ()=>{}) : null, 'input');
  wire('pmax-snap-cab',    typeof renderPmaxSnap === 'function' ? renderPmaxSnap : null, 'change');
  wire('pmax-snap-status', typeof renderPmaxSnap === 'function' ? renderPmaxSnap : null, 'change');
  
  wire('pmax-snap-search', db(typeof renderPmaxSnap==='function'?renderPmaxSnap:()=>{}), 'input');
  wire('pmax-snap-cab',    typeof renderPmaxSnap==='function'?renderPmaxSnap:null, 'change');
  wire('pmax-snap-status', typeof renderPmaxSnap==='function'?renderPmaxSnap:null, 'change');


  // WWN modal

  // WWN modal — backdrop + close + format buttons + copy all + close primary
  const wwnModal = document.getElementById('wwnModal');
  if (wwnModal) {
    wwnModal.addEventListener('click', e => { if (e.target === wwnModal) closeWwnModal(); });
  }
  const _wire = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); };
  _wire('wwnModalClose', closeWwnModal);
  _wire('fmtColon', () => setWwnFormat('colon'));
  _wire('fmtPlain', () => setWwnFormat('plain'));
  _wire('wwnCopyAll', copyAllWwns);
  _wire('wwnClosePrimary', closeWwnModal);

  // Retry
  const retry = document.getElementById('btn-retry-load');
  if (retry) retry.addEventListener('click', typeof loadCSVs === 'function' ? loadCSVs : () => window.location.reload());

  // Export mapped hosts
  const expBtn = document.getElementById('btn-export-mapped');
  if (expBtn) expBtn.addEventListener('click', () => exportMappedHosts('pmax'));

  // Host filter delegation (stat card, cabinet cards, os-legend)
  document.addEventListener('click', e => {
    const el = e.target.closest('[data-host-filter]');
    if (el) { e.stopPropagation(); try { applyHostFilter(JSON.parse(el.dataset.hostFilter)); } catch{} }
  });

  // WWN cell click (table rows — dynamically built)
  document.addEventListener('click', e => {
    const td = e.target.closest('[data-wwn-idx]');
    if (td) openWwnModalByIdx(parseInt(td.dataset.wwnIdx, 10));
  });

  // WWN copy single button (modal)
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-wwn-copy-idx]');
    if (btn) copyOne(btn, parseInt(btn.dataset.wwnCopyIdx, 10));
  });

  // Sort headers
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortHost(th.dataset.sort));
  });

  // Chip clear
  document.addEventListener('click', e => {
    if (e.target.closest('#pmax-chip-clear')) clearHostFilters();
  });
})();
